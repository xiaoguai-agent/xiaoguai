version: 2

updates:
  # ── 1. Rust / Cargo (workspace root) ──────────────────────────────────────
  - package-ecosystem: cargo
    directory: /
    target-branch: main
    schedule:
      interval: daily
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    # reviewers:
    #   - your-github-handle
    # assignees:
    #   - your-github-handle
    groups:
      cargo-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    # Major-version bumps intentionally excluded from the group so each gets
    # its own PR with full changelog context.

  # ── 2. JavaScript / pnpm (frontend workspace) ─────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    target-branch: main
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
    versioning-strategy: increase
    # reviewers:
    #   - your-github-handle
    # assignees:
    #   - your-github-handle
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # ── 3. GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
    # reviewers:
    #   - your-github-handle
    # assignees:
    #   - your-github-handle
    ignore:
      # dtolnay/rust-toolchain pins the Rust toolchain via its tag
      # (e.g. @1.88.0 installs Rust 1.88, our MSRV). Dependabot misreads
      # the tag as an action version and tries to bump it past the MSRV,
      # which breaks the build. Toolchain bumps are done deliberately via
      # rust-toolchain.toml, not here.
      - dependency-name: "dtolnay/rust-toolchain"
    groups:
      actions-all:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
