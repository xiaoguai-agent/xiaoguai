name: Bug Report
description: Report a defect or unexpected behaviour in xiaoguai.
title: "bug: <short description>"
labels: ["bug", "triage"]
assignees: []
body:
  - type: dropdown
    id: version
    attributes:
      label: Version
      description: Which release are you running?
      options:
        - v1.3.0 (wave-3 latest)
        - v1.2.24
        - v1.2.23
        - v1.2.22
        - v1.2.21
        - v1.2.20
        - v1.2.x (other — specify in logs)
        - main / unreleased
    validations:
      required: true

  - type: dropdown
    id: subsystem
    attributes:
      label: Affected subsystem
      description: Which part of the system is misbehaving?
      options:
        - HotL / policy store
        - outcomes / OutcomeRecorder
        - packs / SkillPackRepository
        - watch / file-watcher
        - anomaly detection
        - rate-limit / token budget
        - IM-adapter (Slack / Teams / Discord)
        - observability / tracing / metrics
        - cli / admin tooling
        - admin-ui (web)
        - chat-ui (web)
        - other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic sequence that triggers the bug.
      placeholder: |
        1. Start server with `cargo run --bin xiaoguai-server -- --config config.toml`
        2. Send request: `curl …`
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs. actual behaviour
      placeholder: |
        **Expected:** …
        **Actual:** …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste log output. Wrap in triple-backticks or use the "attach" button for large files.
      render: shell

  - type: input
    id: env
    attributes:
      label: Environment
      description: "OS, Rust toolchain, deployment method (Docker / bare metal / k8s), DB version if relevant."
      placeholder: "macOS 14.5 / rustc 1.78 / Docker 26 / Postgres 16"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I consulted the runbooks in `docs/runbooks/` and the issue persists.
          required: true
        - label: I can reproduce this on the latest release or main.
