name: Release — bare-metal tarball

# v1.1.6: ships the bare-metal install target.
# v1.1.6.3: adds cosign keyless signing + SLSA L3 provenance attestations.
#
# Lives separately from release.yml (which builds the container image + SBOM)
# so a failure in either pipeline doesn't gate the other. Both fire on the
# same `v*` tag push.
#
# Job graph:
#   build (matrix: x86_64, aarch64)
#     └─> sign        (cosign keyless sign each tarball → .sig + .pem)
#           └─> provenance  (slsa-framework/slsa-github-generator, reusable workflow)
#                 └─> verify-provenance
#                       └─> publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build tarball (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: tarball-${{ matrix.target }}

      - name: Install `cross`
        run: cargo install cross --locked --version 0.2.5

      # Build the web UIs so build-tarball.sh bundles them under
      # share/xiaoguai/static (the server auto-detects + serves them).
      # admin-ui needs VITE_BASE=/admin/.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build web UIs
        working-directory: frontend
        run: |
          npm install -g pnpm@9.12.0
          pnpm install --frozen-lockfile
          pnpm --filter @xiaoguai/shared build
          pnpm --filter @xiaoguai/chat-ui build
          VITE_BASE=/admin/ pnpm --filter @xiaoguai/admin-ui build

      - name: Build tarball
        run: |
          # Derive VERSION: strip leading 'v' from a tag ref, or use a
          # dev sentinel for branch/manual runs (no real semver on the wire).
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            export VERSION="${{ github.ref_name }}"
            export VERSION="${VERSION#v}"
          else
            export VERSION="0.0.0+ci.${GITHUB_SHA::7}"
          fi
          # Single-target invocation: replace the matrix in the script with
          # the current matrix value.
          export TARGETS="${{ matrix.target }}"
          bash scripts/release/build-tarball.sh

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v7
        with:
          name: tarball-${{ matrix.target }}
          path: dist/xiaoguai-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ── v1.1.6.3 ─────────────────────────────────────────────────────────────────
  # Sign each tarball with cosign keyless (Sigstore) and upload the
  # certificate (.pem) + detached signature (.sig) as artifacts.
  # The signed tarballs are later picked up by the provenance + publish jobs.
  # Skipped on branch/manual runs — no GitHub Release to attach signatures to.
  sign:
    name: Sign tarballs (cosign keyless)
    needs: build
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required by cosign for OIDC-based keyless signing.
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Collect tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: tarball-*
          merge-multiple: true
          path: dist

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign tarballs
        run: |
          for tarball in dist/xiaoguai-*.tar.gz; do
            echo "Signing ${tarball} ..."
            cosign sign-blob --yes \
              --bundle "${tarball}.bundle" \
              "${tarball}"
            # Also emit legacy .sig + .pem for tooling that doesn't consume bundles.
            cosign sign-blob --yes \
              --output-signature "${tarball}.sig" \
              --output-certificate "${tarball}.pem" \
              "${tarball}"
          done

      - name: Upload signatures
        uses: actions/upload-artifact@v7
        with:
          name: tarball-signatures
          path: |
            dist/xiaoguai-*.tar.gz.sig
            dist/xiaoguai-*.tar.gz.pem
            dist/xiaoguai-*.tar.gz.bundle
          if-no-files-found: error
          retention-days: 7

  # ── v1.1.6.3 ─────────────────────────────────────────────────────────────────
  # Compute the base64-encoded SHA256 hashes that the SLSA generator expects,
  # then hand them off to the reusable workflow.
  #
  # slsa-github-generator v2.0.0 requires that this job be isolated; it reads
  # the hashes from a JSON string produced here and passed via `with:`.
  hash:
    name: Compute artifact hashes for SLSA
    needs: build
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Collect tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: tarball-*
          merge-multiple: true
          path: dist

      - name: Compute hashes
        id: hash
        run: |
          # slsa-github-generator expects "base64(sha256:hex<SP>filename)" lines,
          # all concatenated and base64-encoded as a single JSON-safe string.
          cd dist
          sha256sum xiaoguai-*.tar.gz | base64 -w0 > /tmp/hashes.b64
          echo "hashes=$(cat /tmp/hashes.b64)" >> "$GITHUB_OUTPUT"

  # ── v1.1.6.3 ─────────────────────────────────────────────────────────────────
  # SLSA Level 3 provenance generated by the official slsa-framework reusable
  # workflow. This job runs in an isolated environment controlled by the
  # framework so the provenance cannot be tampered with by this repository's
  # workflow code.
  #
  # Pin version: v2.0.0 (sha256 tag pin is recommended for supply-chain
  # hardening; update deliberately when the framework releases a new version).
  provenance:
    name: Generate SLSA L3 provenance
    needs: hash
    if: ${{ github.ref_type == 'tag' }}
    permissions:
      # Required by the reusable workflow to create the attestation.
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.hash.outputs.hashes }}
      # Upload the attestation directly to the GitHub Release.
      upload-assets: true

  # ── v1.1.6.3 ─────────────────────────────────────────────────────────────────
  # Sanity-check the provenance before publishing.  Runs slsa-verifier against
  # one of the tarballs + the attestation emitted by the provenance job so we
  # catch drift before the assets are publicly linked to the release.
  verify-provenance:
    name: Verify SLSA provenance
    needs: [build, provenance]
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Collect tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: tarball-*
          merge-multiple: true
          path: dist

      - name: Download provenance attestation
        uses: actions/download-artifact@v8
        with:
          # The reusable workflow always names its output artifact this.
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: dist

      - name: Install slsa-verifier
        run: |
          # Pin to a known-good release; bump deliberately.
          # v2.7.0 added "handle dssev001 tlog entry types" (PR #799); v2.6.0
          # rejected the generator's DSSE Rekor entries with
          # "unexpected tlog entry type: expected intoto:0.0.2, got dsse:0.0.1",
          # which failed verify-provenance and skipped the publish job.
          VERSION=v2.7.1
          curl -fsSL \
            "https://github.com/slsa-framework/slsa-verifier/releases/download/${VERSION}/slsa-verifier-linux-amd64" \
            -o /usr/local/bin/slsa-verifier
          chmod +x /usr/local/bin/slsa-verifier

      - name: Verify provenance for x86_64 tarball
        run: |
          # build-tarball.sh names the artifact `xiaoguai-v${VERSION}-<target>.tar.gz`
          # i.e. the tag ref_name (WITH its leading 'v') — e.g. xiaoguai-v1.10.0-...
          # The earlier code stripped the 'v' and looked for xiaoguai-1.10.0-...,
          # which never existed → "no such file" + digest-mismatch, skipping the
          # publish job. Use ref_name verbatim so it matches the built filename.
          TARBALL="dist/xiaoguai-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz"
          slsa-verifier verify-artifact "${TARBALL}" \
            --provenance-path "dist/${{ needs.provenance.outputs.provenance-name }}" \
            --source-uri "github.com/xiaoguai-agent/xiaoguai" \
            --source-tag "${{ github.ref_name }}"

  # ── Aggregate per-target tarballs, write a combined SHA256SUMS, attach
  # everything (tarballs + signatures + attestation) to the GitHub Release.
  # Aggregate per-target tarballs, write a combined SHA256SUMS, and attach
  # everything (tarballs + signatures + attestation) to the GitHub Release.
  # Skipped on branch/manual runs — no GitHub Release exists to attach to.
  publish:
    name: Publish to GitHub Release
    needs: [build, sign, verify-provenance]
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Collect tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: tarball-*
          merge-multiple: true
          path: dist

      - name: Collect signatures
        uses: actions/download-artifact@v8
        with:
          name: tarball-signatures
          path: dist

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum xiaoguai-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/xiaoguai-*.tar.gz
            dist/xiaoguai-*.tar.gz.sig
            dist/xiaoguai-*.tar.gz.pem
            dist/xiaoguai-*.tar.gz.bundle
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          body: |
            ## Verifying release artifacts

            ### cosign (keyless / Sigstore)

            ```sh
            # Download the tarball + certificate + signature
            VERSION="${{ github.ref_name }}"
            ARCH=x86_64-unknown-linux-gnu   # or aarch64-unknown-linux-gnu
            # Filenames keep the tag's leading 'v' (build-tarball.sh: xiaoguai-v${VERSION}-...)
            BASE="xiaoguai-${VERSION}-${ARCH}"

            cosign verify-blob \
              --certificate  "${BASE}.tar.gz.pem" \
              --signature    "${BASE}.tar.gz.sig" \
              --certificate-identity-regexp \
                'https://github.com/xiaoguai-agent/xiaoguai/.github/workflows/release-tarball.yml@.*' \
              --certificate-oidc-issuer \
                'https://token.actions.githubusercontent.com' \
              "${BASE}.tar.gz"
            ```

            A `VERIFIED OK` message confirms the tarball was built by this workflow
            and has not been modified since signing.

            ### SLSA Level 3 provenance

            ```sh
            # The attestation is attached as multiple.intoto.jsonl
            slsa-verifier verify-artifact "${BASE}.tar.gz" \
              --provenance-path multiple.intoto.jsonl \
              --source-uri github.com/xiaoguai-agent/xiaoguai \
              --source-tag "${{ github.ref_name }}"
            ```

            See [docs/runbooks/release-signing.md](https://github.com/xiaoguai-agent/xiaoguai/blob/main/docs/runbooks/release-signing.md)
            for full installation instructions and trust-root details.
