name: Release — bare-metal tarball

# v1.1.6: ships the bare-metal install target.
#
# Lives separately from release.yml (which builds the container image + SBOM)
# so a failure in either pipeline doesn't gate the other. Both fire on the
# same `v*` tag push.

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build tarball (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: tarball-${{ matrix.target }}

      - name: Install `cross`
        run: cargo install cross --locked --version 0.2.5

      - name: Build tarball
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip the leading `v` — VERSION env var stores the bare semver.
          export VERSION="${VERSION#v}"
          # Single-target invocation: replace the matrix in the script with
          # the current matrix value.
          export TARGETS="${{ matrix.target }}"
          bash scripts/release/build-tarball.sh

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.target }}
          path: dist/xiaoguai-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  # Aggregate per-target tarballs, write a combined SHA256SUMS, and attach
  # everything to the GitHub Release.
  publish:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Collect tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: tarball-*
          merge-multiple: true
          path: dist

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum xiaoguai-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/xiaoguai-*.tar.gz
            dist/SHA256SUMS
          fail_on_unmatched_files: true
