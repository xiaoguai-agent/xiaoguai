name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Reliability harness: the Test step kept dying on the ~14 GB runner because
  # the workspace's debug artifacts (30 crates × full debuginfo) overflowed the
  # disk mid-`cargo test`. Strip debuginfo and disable incremental in CI —
  # neither helps a CI gate and together they cut the target/ footprint by well
  # over half, which is what makes the Test step fit and finish.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_INCREMENTAL: "0"
  # Reliability harness round 2: the debuginfo strip fixed the warm-cache path,
  # but a COLD cache (new branch / Cargo.lock change) still died with "runner
  # lost communication" ~52 min into the full-workspace compile — a runner OOM
  # during peak parallel codegen/linking (wasmtime, qdrant, opentelemetry are
  # heavy). Cap concurrent rustc jobs to halve peak RAM; combined with an 8 GB
  # swapfile (below) this keeps the cold build inside the runner envelope. The
  # warm-cache path stays ~20 min — these only bite the rare full rebuild.
  CARGO_BUILD_JOBS: "2"

jobs:
  build-test:
    name: Build and test
    # Cold rebuild with jobs=2 is slower-but-survives; give it headroom over the
    # old 60 (a hung run still fails visibly, not at the 6 h default).
    timeout-minutes: 90
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      # Reclaim ~25 GB of preinstalled toolchains so the build artifacts fit.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /
      # Add 8 GB swap so a peak-RAM spike during linking is paged out instead of
      # OOM-killing the runner agent ("lost communication"). GitHub runners ship
      # with little/no swap by default.
      - name: Add swap
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      # `clippy --all-targets` already check-compiles every target (lib, bins,
      # tests, examples, benches), so the previous standalone
      # `cargo build --all-targets` was a redundant THIRD full compile that
      # doubled the disk peak. Gate on clippy, then let `cargo test` produce the
      # test binaries. `--locked` keeps CI reproducible against Cargo.lock.
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      # Eval-driven development gate (CLAUDE.md): run the regression eval suite
      # through the real CLI path (arg parsing -> suite load -> grade -> exit
      # code), not just the lib tests. `xiaoguai eval run` exits non-zero when
      # any case fails. Deps are already compiled by the Test step, so this is
      # mostly linking the one bin.
      - name: Eval suite (regression)
        run: >
          cargo run -p xiaoguai-cli --locked --
          eval run --suite regression
          --cases-dir crates/xiaoguai-eval/examples/eval/regression

  migrations-smoke:
    name: Migrations smoke (embedded SQLite)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - name: Apply all migrations to a fresh SQLite DB
        run: cargo test -p xiaoguai-storage migrations_apply_clean --locked -- --include-ignored
