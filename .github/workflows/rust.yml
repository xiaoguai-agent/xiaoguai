name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs (an update-branch push otherwise leaves the old
# run going — it occupies a runner for up to ~75 min and its failure confuses
# forensics). Main pushes never cancel: a gate run on main must finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # For the ci-test-crate.sh forensics beacon (gh api → issue #243).
  GH_TOKEN: ${{ github.token }}
  # Reliability harness: the Test step kept dying on the ~14 GB runner because
  # the workspace's debug artifacts (30 crates × full debuginfo) overflowed the
  # disk mid-`cargo test`. Strip debuginfo and disable incremental in CI —
  # neither helps a CI gate and together they cut the target/ footprint by well
  # over half, which is what makes the Test step fit and finish.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_INCREMENTAL: "0"
  # Reliability harness round 2: the debuginfo strip fixed the warm-cache path,
  # but a COLD cache (new branch / Cargo.lock change) still died with "runner
  # lost communication" ~52 min into the full-workspace compile — a runner OOM
  # during peak parallel codegen/linking (wasmtime, qdrant, opentelemetry are
  # heavy). Cap concurrent rustc jobs to halve peak RAM; combined with an 8 GB
  # swapfile (below) this keeps the cold build inside the runner envelope. The
  # warm-cache path stays ~20 min — these only bite the rare full rebuild.
  CARGO_BUILD_JOBS: "2"

jobs:
  build-test:
    name: Build and test
    # issues:write is for the ci-test-crate.sh forensics beacon (issue #243):
    # it PATCHes one issue comment with the box's state while the suspect
    # crate's tests run, so a runner death can't destroy the evidence.
    permissions:
      contents: read
      issues: write
    # Cold rebuild with jobs=2 is slower-but-survives; give it headroom over the
    # old 60 (a hung run still fails visibly, not at the 6 h default).
    timeout-minutes: 120
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      # Reclaim ~25 GB of preinstalled toolchains so the build artifacts fit.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /
      # Add 8 GB swap so a peak-RAM spike during linking is paged out instead of
      # OOM-killing the runner agent ("lost communication"). GitHub runners ship
      # with little/no swap by default.
      - name: Add swap
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          # Second swapfile on the root disk: the Test step's peak is a
          # deterministic OOM (6 consecutive runner deaths at 54m04s ±2s)
          # that the first 8 GB did not absorb. NB the runner image already
          # has an ACTIVE /swapfile (fallocate on it → "Text file busy"),
          # hence /swapfile2.
          sudo fallocate -l 8G /swapfile2
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          free -h
      # mold: the runner deaths trace to the default bfd linker — each big test
      # binary (wasmtime/qdrant/otel deps) spikes several GB at link, and with
      # ~30 test binaries even serial links keep the box at the edge until the
      # runner agent is OOM-killed or starved ("lost communication", last death
      # 58 min into Test with 16 GB swap). mold links in a fraction of the
      # memory and time. Invoked as `mold -run cargo …` so RUSTFLAGS stay
      # unchanged — compile fingerprints (and the warm cache) remain valid.
      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # The runner sometimes dies mid-`cargo test` (resource marginality).
          # Saving the cache even on failure means the next run resumes from
          # the partial compile instead of restarting cold — runs CONVERGE
          # instead of looping on cold-start death.
          # NB this only fires when a STEP fails; a runner death skips post-run
          # entirely. The choom shield below exists to turn runner deaths into
          # plain step failures so this save actually happens.
          cache-on-failure: true
      - name: Format check
        run: cargo fmt --check
      # `clippy --all-targets` already check-compiles every target (lib, bins,
      # tests, examples, benches), so the previous standalone
      # `cargo build --all-targets` was a redundant THIRD full compile that
      # doubled the disk peak. Gate on clippy, then let `cargo test` produce the
      # test binaries. `--locked` keeps CI reproducible against Cargo.lock.
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # Split build/run so forensics can tell a compile/link death from a test
      # death, and so an OOM in either phase fails ONE step (cache still saves).
      # --jobs 1 (overrides CARGO_BUILD_JOBS=2): serial codegen/link keeps the
      # peak to a single binary at a time. `choom -n 800` marks the cargo
      # process tree as the kernel's preferred OOM victim — if memory still
      # spikes, rustc/ld dies (visible step failure, cache saved, retry
      # converges) instead of the runner agent ("lost communication", cache
      # lost, retries cold-loop forever).
      - name: Build tests
        run: choom -n 800 -- mold -run cargo test --workspace --locked --jobs 1 --no-run
      # Test phase, one step per crate (.github/ci-test-crate.sh = cgroup
      # memory jail + choom + mold). The recurring runner death ~45 min into a
      # monolithic Test step destroys the in-progress step's log — but
      # COMPLETED steps' logs and step metadata survive, so per-crate steps
      # make the dying step itself name the culprit crate. Binaries are
      # already built by Build tests; each step is fingerprint-check + run.
      - name: Test xiaoguai-types
        run: .github/ci-test-crate.sh xiaoguai-types
      - name: Test xiaoguai-config
        run: .github/ci-test-crate.sh xiaoguai-config
      - name: Test xiaoguai-storage
        run: .github/ci-test-crate.sh xiaoguai-storage
      - name: Test xiaoguai-audit
        run: .github/ci-test-crate.sh xiaoguai-audit
      - name: Test xiaoguai-observability
        run: .github/ci-test-crate.sh xiaoguai-observability
      - name: Test xiaoguai-auth
        run: .github/ci-test-crate.sh xiaoguai-auth
      - name: Test xiaoguai-llm
        run: .github/ci-test-crate.sh xiaoguai-llm
      - name: Test xiaoguai-mcp
        run: .github/ci-test-crate.sh xiaoguai-mcp
      - name: Test xiaoguai-mcp-exec
        run: .github/ci-test-crate.sh xiaoguai-mcp-exec
      - name: Test xiaoguai-mcp-exec-js
        run: .github/ci-test-crate.sh xiaoguai-mcp-exec-js
      - name: Test xiaoguai-mcp-exec-wasm
        run: .github/ci-test-crate.sh xiaoguai-mcp-exec-wasm
      - name: Test xiaoguai-rag
        run: .github/ci-test-crate.sh xiaoguai-rag
      - name: Test xiaoguai-scheduler
        run: .github/ci-test-crate.sh xiaoguai-scheduler
      - name: Test xiaoguai-agent
        run: .github/ci-test-crate.sh xiaoguai-agent
      - name: Test xiaoguai-im-feishu
        run: .github/ci-test-crate.sh xiaoguai-im-feishu
      - name: Test xiaoguai-im-gateway
        run: .github/ci-test-crate.sh xiaoguai-im-gateway
      - name: Test xiaoguai-api
        run: .github/ci-test-crate.sh xiaoguai-api
      - name: Test xiaoguai-eval
        run: .github/ci-test-crate.sh xiaoguai-eval
      - name: Test xiaoguai-memory
        run: .github/ci-test-crate.sh xiaoguai-memory
      - name: Test xiaoguai-personas
        run: .github/ci-test-crate.sh xiaoguai-personas
      - name: Test xiaoguai-runtime
        run: .github/ci-test-crate.sh xiaoguai-runtime
      - name: Test xiaoguai-tasks
        run: .github/ci-test-crate.sh xiaoguai-tasks
      - name: Test xiaoguai-im-dingtalk
        run: .github/ci-test-crate.sh xiaoguai-im-dingtalk
      - name: Test xiaoguai-im-wecom
        run: .github/ci-test-crate.sh xiaoguai-im-wecom
      - name: Test xiaoguai-coding
        run: .github/ci-test-crate.sh xiaoguai-coding
      - name: Test xiaoguai-core
        run: .github/ci-test-crate.sh xiaoguai-core
      - name: Test xiaoguai-acp
        run: .github/ci-test-crate.sh xiaoguai-acp
      - name: Test xiaoguai-im-discord
        run: .github/ci-test-crate.sh xiaoguai-im-discord
      - name: Test xiaoguai-im-telegram
        run: .github/ci-test-crate.sh xiaoguai-im-telegram
      - name: Test xiaoguai-im-mattermost
        run: .github/ci-test-crate.sh xiaoguai-im-mattermost
      - name: Test xiaoguai-im-slack
        run: .github/ci-test-crate.sh xiaoguai-im-slack
      - name: Test xiaoguai-cli
        run: .github/ci-test-crate.sh xiaoguai-cli
      - name: Test xiaoguai-orchestrator
        run: .github/ci-test-crate.sh xiaoguai-orchestrator
      - name: Test xiaoguai-watch
        run: .github/ci-test-crate.sh xiaoguai-watch
      - name: Test xiaoguai-anomaly
        run: .github/ci-test-crate.sh xiaoguai-anomaly
      - name: Test xiaoguai-migrate-smoke
        run: .github/ci-test-crate.sh xiaoguai-migrate-smoke
      # Resource forensics for the recurring runner-death: capture the disk /
      # memory state even when the Test step failed.
      - name: Resource diagnostics
        if: always()
        run: |
          df -h / /mnt 2>/dev/null; free -h; du -sh target 2>/dev/null || true
          # cgroup-OOM forensics: when a per-crate step's test was OOM-killed
          # by the testcap jail, dmesg names the victim process and prints the
          # cgroup memory report.
          sudo dmesg 2>/dev/null | grep -iE "oom|killed process" | tail -20 || true
          cat /sys/fs/cgroup/testcap/memory.peak 2>/dev/null || true
      # Eval-driven development gate (CLAUDE.md): run the regression eval suite
      # through the real CLI path (arg parsing -> suite load -> grade -> exit
      # code), not just the lib tests. `xiaoguai eval run` exits non-zero when
      # any case fails. Deps are already compiled by the Test step, so this is
      # mostly linking the one bin.
      - name: Eval suite (regression)
        run: >
          choom -n 800 -- mold -run
          cargo run -p xiaoguai-cli --locked --
          eval run --suite regression
          --cases-dir crates/xiaoguai-eval/examples/eval/regression

  migrations-smoke:
    name: Migrations smoke (embedded SQLite)
    # CARGO_BUILD_JOBS=2 (top-level env) throttles this job's cold compile too.
    timeout-minutes: 45
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Apply all migrations to a fresh SQLite DB
        run: cargo test -p xiaoguai-storage migrations_apply_clean --locked -- --include-ignored
