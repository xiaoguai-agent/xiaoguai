name: E2E (Playwright)

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "crates/xiaoguai-api/**"
      # The suite boots deploy/docker-compose.yml — image/compose changes must
      # re-run it (the /data-volume boot regression slipped through unseen).
      - "deploy/**"
      - ".github/workflows/e2e.yml"
  # Allow manual trigger for debugging.
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - uses: actions/checkout@v7

      # ----------------------------------------------------------------
      # 2. Start the docker-compose stack (single xiaoguai-core service,
      #    embedded SQLite — DEC-033)
      # ----------------------------------------------------------------
      - name: Start docker-compose stack
        run: |
          docker compose -f deploy/docker-compose.yml up --build --detach
        env:
          DOCKER_BUILDKIT: "1"

      # ----------------------------------------------------------------
      # 3. Node + pnpm setup
      # ----------------------------------------------------------------
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # ----------------------------------------------------------------
      # 4. Install Playwright browsers (only the matrix browser)
      # ----------------------------------------------------------------
      - name: Install Playwright browser
        working-directory: frontend/e2e
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      # ----------------------------------------------------------------
      # 5. Build frontend assets for serving
      #    (chat-ui → dist served at http://localhost:5173 via `vite preview`)
      #    (admin-ui → dist served at http://localhost:5174 via `vite preview`)
      # ----------------------------------------------------------------
      # The UIs default their API base to window.location.origin; served via
      # `vite preview` on :5173/:5174 that points at the wrong port. Bake the
      # API origin (the docker stack on :7600) in at build time so the
      # real-backend specs (golden path, scheduler-flow) reach it.
      - name: Build chat-ui
        working-directory: frontend/chat-ui
        run: pnpm build
        env:
          VITE_API_URL: "http://localhost:7600"

      - name: Build admin-ui
        working-directory: frontend/admin-ui
        run: pnpm build
        env:
          VITE_API_URL: "http://localhost:7600"

      - name: Serve chat-ui (background)
        working-directory: frontend/chat-ui
        run: pnpm exec vite preview --port 5173 &

      - name: Serve admin-ui (background)
        working-directory: frontend/admin-ui
        run: pnpm exec vite preview --port 5174 &

      # ----------------------------------------------------------------
      # 6. Wait for all services to be healthy
      # ----------------------------------------------------------------
      - name: Wait for xiaoguai-core /healthz
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7600/healthz; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API... attempt $i"
            sleep 3
          done
          echo "::error::xiaoguai-core never became healthy — dumping container logs"
          docker compose -f deploy/docker-compose.yml ps -a || true
          docker compose -f deploy/docker-compose.yml logs --no-color xiaoguai-core \
            || docker logs deploy-xiaoguai-core-1 || true
          exit 1

      - name: Wait for chat-ui
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/; then
              echo "chat-ui is up"
              break
            fi
            sleep 2
          done

      - name: Wait for admin-ui
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5174/; then
              echo "admin-ui is up"
              break
            fi
            sleep 2
          done

      # ----------------------------------------------------------------
      # 7. Run Playwright tests (single-browser shard)
      # ----------------------------------------------------------------
      - name: Run Playwright tests (${{ matrix.browser }})
        working-directory: frontend/e2e
        run: |
          # scheduler-flow is defined chromium-only in playwright.config.ts
          # (7 projects since d6998d4); selecting a non-existent project makes
          # Playwright exit non-zero, which kept the firefox/webkit shards
          # permanently red. Only request it on the chromium shard.
          projects=(
            --project="chat-ui / ${{ matrix.browser }}"
            --project="admin-ui / ${{ matrix.browser }}"
          )
          if [ "${{ matrix.browser }}" = "chromium" ]; then
            projects+=(--project="scheduler-flow / chromium")
          fi
          pnpm exec playwright test "${projects[@]}"
        env:
          BASE_URL: "http://localhost:7600"
          CHAT_UI_URL: "http://localhost:5173"
          ADMIN_UI_URL: "http://localhost:5174"
          CI: "true"

      # ----------------------------------------------------------------
      # 8. Upload artifacts on failure
      # ----------------------------------------------------------------
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: frontend/e2e/playwright-report/
          retention-days: 14

      - name: Upload traces and videos
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-${{ matrix.browser }}
          path: frontend/e2e/test-results/
          retention-days: 7

      # ----------------------------------------------------------------
      # 9. Tear down the compose stack
      # ----------------------------------------------------------------
      - name: Tear down docker-compose stack
        if: always()
        run: |
          # Capture server logs before destroying the stack — the distroless
          # image has no shell, so this is the only forensic window.
          docker compose -f deploy/docker-compose.yml logs --no-color xiaoguai-core \
            || docker logs deploy-xiaoguai-core-1 || true
          docker compose -f deploy/docker-compose.yml down -v
