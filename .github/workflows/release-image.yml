name: Release (container image + SBOM)

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- Container image (multi-arch) -------------------------------------
  image:
    name: Build + push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          push: true
          provenance: true
          sbom: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image (keyless via GitHub OIDC)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  # ---- SBOM artefact ----------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        # Pinned to 0.5.9: investigated in docs/architecture/sbom-cyclonedx-migration.md.
        # --output-pattern / --output-path were removed before 0.5.8; 0.5.8 and 0.5.9
        # have identical flags. 0.5.9 adds SOURCE_DATE_EPOCH reproducible-build support.
        # Schema difference vs 0.5.8: empty dependsOn:[] arrays omitted on leaf nodes
        # (semantically equivalent per CycloneDX 1.3 spec).
        run: cargo install cargo-cyclonedx@0.5.9 --locked
      - name: Generate SBOM
        # cargo cyclonedx emits one .cdx.json per workspace crate alongside its Cargo.toml.
        # Collect them all into sbom/ for the artifact upload.
        run: |
          cargo cyclonedx --format json
          mkdir -p sbom
          find . -name "*.cdx.json" -not -path "./target/*" -exec cp {} sbom/ \;
      - uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom/
