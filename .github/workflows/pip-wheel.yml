name: Pip wheel

# Fires on the same `v*` tag pattern as release.yml so wheel builds
# land alongside the container image + SBOM. Sibling worktrees C7
# (tarball) and C9 (CI security) also hook into v* tags via their
# own dedicated workflow files — keep changes scoped to this file
# only to avoid cross-worktree merge conflicts.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Force a XIAOGUAI_VERSION value (manual builds only).'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  # cibuildwheel's default verbosity is too quiet for diagnosing
  # native-binary staging issues. 1 = print each step's command.
  CIBW_BUILD_VERBOSITY: '1'

jobs:
  # ---------------------------------------------------------------------
  # Matrix: build the native Rust binary, then build a platform-tagged
  # wheel that bundles it as package data.
  #
  # Each job stages its binary under
  #   python/xiaoguai/src/xiaoguai/_binary/<target>/xiaoguai[.exe]
  # before invoking cibuildwheel so the wheel picks it up via the
  # package-data glob in pyproject.toml.
  # ---------------------------------------------------------------------
  build-wheel:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14            # M-series runner
            cibw_archs: arm64
            cibw_platform: macos
          - target: x86_64-apple-darwin
            runner: macos-14            # build x86_64 on the M-series runner —
            cibw_archs: x86_64          # the macos-13 Intel runner consistently
            cibw_platform: macos        # hangs; cross-compile + Rosetta test instead
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cibw_archs: x86_64
            cibw_platform: linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm    # GitHub-hosted ARM runner
            cibw_archs: aarch64
            cibw_platform: linux

    steps:
      - uses: actions/checkout@v6

      - name: Compute XIAOGUAI_VERSION
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version_override }}" ]]; then
            VERSION="${{ inputs.version_override }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Strip the leading 'v' from v1.1.7 -> 1.1.7
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0+ci.${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "XIAOGUAI_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved XIAOGUAI_VERSION=$VERSION"

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cargo-zigbuild + zig (Linux targets)
        if: matrix.cibw_platform == 'linux'
        run: |
          python3 -m pip install --break-system-packages ziglang
          cargo install --locked cargo-zigbuild

      - name: Build native binary
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${{ matrix.cibw_platform }}" = "linux" ]; then
            # cargo-zigbuild pins the binary's glibc floor to 2.28 on any host —
            # no Docker (unlike `cross`, which can't run on the arm64 runner) and
            # no emulation. A plain host build on ubuntu-latest (glibc 2.39) needs
            # symbols newer than any manylinux_* image, so auditwheel can't repair
            # it; pinning 2.28 makes the wheel manylinux_2_28-compliant.
            cargo zigbuild --release --locked --target "${{ matrix.target }}.2.28" -p xiaoguai-cli
          else
            # macOS: cross-compile x86_64 on the arm runner too (target added by
            # rust-toolchain); cibuildwheel tests it under Rosetta. Pin the
            # deployment target to 11.0 so the binary's min-OS matches the wheel
            # tag — otherwise delocate rejects a newer binary against the default
            # macosx_10_9 tag.
            MACOSX_DEPLOYMENT_TARGET=11.0 \
              cargo build --release --locked --target "${{ matrix.target }}" -p xiaoguai-cli
          fi

      - name: Stage binary for package data
        shell: bash
        run: |
          set -euxo pipefail
          DEST="python/xiaoguai/src/xiaoguai/_binary/${{ matrix.target }}"
          mkdir -p "$DEST"
          cp "target/${{ matrix.target }}/release/xiaoguai" "$DEST/xiaoguai"
          chmod +x "$DEST/xiaoguai"
          ls -la "$DEST"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: python/xiaoguai
          output-dir: wheelhouse
        env:
          XIAOGUAI_VERSION: ${{ steps.version.outputs.version }}
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_PLATFORM: ${{ matrix.cibw_platform }}
          # Tag macOS wheels macosx_11_0 to match the binary's min-OS (set at
          # build time); ignored on Linux. Keeps delocate from rejecting the
          # x86_64 binary against the default 10.9 tag.
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          # Re-export inside the cibuildwheel container too — the
          # Linux build runs setup.py inside a manylinux image that
          # does NOT inherit the host env unless we ask it to.
          CIBW_ENVIRONMENT: XIAOGUAI_VERSION=${{ steps.version.outputs.version }}

      - name: Inspect wheel contents
        shell: bash
        run: |
          set -euxo pipefail
          for whl in wheelhouse/*.whl; do
            echo "==> $whl"
            python -m zipfile -l "$whl" | grep -E "xiaoguai/_binary|xiaoguai/__main__|xiaoguai/_version" || true
          done

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------
  # Publish to TestPyPI — runs on workflow_dispatch OR on any pre-release
  # tag (e.g. v1.1.7.1rc1, v1.2.0a0, anything whose ref contains '-' or
  # whose version segment contains 'a'/'b'/'rc').
  #
  # No API token needed.  PyPI trusted-publisher OIDC is used throughout.
  # Maintainer setup: see docs/runbooks/pypi-trusted-publisher.md.
  # ---------------------------------------------------------------------
  publish-testpypi:
    name: Rehearsal → TestPyPI
    needs: build-wheel
    runs-on: ubuntu-latest
    # Fire on manual dispatch OR on pre-release tags (contain 'a', 'b', 'rc', or '.dev')
    # NB: match on github.ref_name ("v1.10.5"), NOT github.ref
    # ("refs/tags/v1.10.5") — the latter always contains an 'a' (from "tags"),
    # which misclassified every stable tag as a pre-release.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       github.ref_type == 'tag' &&
       startsWith(github.ref_name, 'v') &&
       (contains(github.ref_name, 'a') || contains(github.ref_name, 'b') ||
        contains(github.ref_name, 'rc') || contains(github.ref_name, '.dev')))
    permissions:
      id-token: write   # OIDC token for TestPyPI trusted publisher
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          # No `password:` — OIDC auto-detected when id-token: write is present.

  # ---------------------------------------------------------------------
  # Publish to PyPI (production) — fires ONLY on stable release tags,
  # i.e. tags that match v* AND do NOT contain a pre-release segment.
  #
  # Condition: push to refs/tags/v* AND ref does NOT contain 'a', 'b',
  # 'rc', or '.dev'.  This mirrors PEP 440 stable-release semantics.
  #
  # Auth: PyPI API token in the `PYPI_API_TOKEN` repo secret.
  # ---------------------------------------------------------------------
  publish:
    name: Publish → PyPI
    needs: build-wheel
    runs-on: ubuntu-latest
    # NB: github.ref_name, not github.ref — see the TestPyPI job above.
    if: >-
      github.event_name == 'push' &&
      github.ref_type == 'tag' &&
      startsWith(github.ref_name, 'v') &&
      !contains(github.ref_name, 'a') &&
      !contains(github.ref_name, 'b') &&
      !contains(github.ref_name, 'rc') &&
      !contains(github.ref_name, '.dev')
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          password: ${{ secrets.PYPI_API_TOKEN }}
          # No `repository-url:` — defaults to https://upload.pypi.org/legacy/.
