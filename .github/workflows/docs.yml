name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/book/**"
      - "docs/runbooks/**"
      - "docs/user-guide/**"
      - "docs/architecture/**"
  pull_request:
    paths:
      - "docs/book/**"
      - "docs/runbooks/**"
      - "docs/user-guide/**"
      - "docs/architecture/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build mdbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdbook
        run: |
          curl -sL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin mdbook
          mdbook --version

      - name: Install mdbook-mermaid
        run: |
          curl -sL https://github.com/badboy/mdbook-mermaid/releases/download/v0.14.0/mdbook-mermaid-v0.14.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin mdbook-mermaid
          mdbook-mermaid --version

      - name: Install mdbook-linkcheck
        run: |
          curl -sSL https://github.com/Michael-F-Bryan/mdbook-linkcheck/releases/download/v0.7.7/mdbook-linkcheck.x86_64-unknown-linux-gnu.zip \
            -o /tmp/linkcheck.zip
          unzip -o -q /tmp/linkcheck.zip -d /usr/local/bin/
          # The zip does not preserve the executable bit; without this the
          # linkcheck backend fails to spawn with "Permission denied".
          chmod +x /usr/local/bin/mdbook-linkcheck
          mdbook-linkcheck --version

      - name: Build book
        run: mdbook build docs/book

      - name: Verify output exists
        # The mdbook-linkcheck backend is enabled (book.toml [output.linkcheck]).
        # With two renderers, mdbook writes each renderer's output to a
        # subdirectory of the build dir, so the HTML site lives at book/html/
        # rather than book/.
        run: |
          test -f docs/book/book/html/index.html || (echo "ERROR: book/html/index.html not found" && exit 1)
          count=$(find docs/book/book/html -name '*.html' | wc -l)
          echo "Generated $count HTML files"
          test "$count" -ge 5 || (echo "ERROR: expected at least 5 HTML files, got $count" && exit 1)
