name: Helm Unittest

on:
  pull_request:
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/helm-unittest.yml'
  push:
    branches: [main]

jobs:
  helm-unittest:
    name: Helm unit tests + lint + template
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.7.2

      - name: Run helm unittest
        run: helm unittest deploy/helm/xiaoguai/

      - name: Helm lint
        run: helm lint deploy/helm/xiaoguai/

      - name: Helm template (dry-run)
        run: |
          helm template xiaoguai deploy/helm/xiaoguai/ \
            -f deploy/helm/xiaoguai/values.yaml \
            > /tmp/rendered.yaml
          echo "Rendered $(wc -l < /tmp/rendered.yaml) lines"

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v7
        with:
          name: rendered-manifests
          path: /tmp/rendered.yaml
          retention-days: 3

  helm-validate-rendered:
    name: Validate rendered manifests (kubeconform)
    runs-on: ubuntu-latest
    needs: helm-unittest

    steps:
      - uses: actions/checkout@v6

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Render manifests
        run: |
          helm template xiaoguai deploy/helm/xiaoguai/ \
            -f deploy/helm/xiaoguai/values.yaml \
            > /tmp/rendered.yaml

      - name: Install kubeconform
        run: |
          curl -sSL \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Validate manifests with kubeconform
        run: |
          kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.31.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered.yaml
