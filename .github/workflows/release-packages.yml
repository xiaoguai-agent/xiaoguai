name: Release — native Linux packages (deb + rpm)

# v1.1.6.1: ships native .deb and .rpm installers alongside the tarball.
#
# Kept separate from release-tarball.yml so a failure in either pipeline
# does not gate the other.  Both fire on the same `v*` tag push.
#
# Architecture: amd64 only for now (the cross-compilation matrix used by
# release-tarball.yml would require installing the matching sysroot inside
# the debootstrap / mock environments, which is non-trivial).  If arm64
# packages are needed later, the recommended path is a self-hosted
# aarch64 runner or a QEMU-binfmt GitHub Actions runner.
#
# GLIBC pinning: both jobs use ubuntu-22.04 (glibc 2.35), which gives a
# reasonable lower bound for Debian 12 / Ubuntu 22.04 / RHEL 9 deployments.
# If an older GLIBC is needed, switch to ubuntu-20.04 or use cargo-zigbuild.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build packages but do not attach to a release"
        required: false
        default: "false"
  push:
    tags:
      - 'v*'

# Serialize with release-tarball.yml — both attach to the SAME GitHub Release on
# the same `v*` tag and would otherwise race to create it (one wins, the other
# creates a stray draft and dies at finalize with `already_exists / tag_name`;
# hit on v1.22.2). The `group:` string MUST match the one in release-tarball.yml.
# See that file's comment for the full rationale. cancel-in-progress: false so
# the queued run waits rather than being cancelled.
concurrency:
  group: gh-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Both package tools need the release binary; build once and reuse.
  # Sprint-12 S12-0: bare two-component versions (`2.6` / `0.14`) are
  # ambiguous to newer cargo and `cargo install --version 2.6` fails with
  # "expected a version like '0.x.x'". Pinning to caret semver
  # (`^2.6` / `^0.14`) keeps us on the same minor stream while satisfying
  # the strict version qualifier expected by cargo >= 1.83. Regression
  # first seen on the v1.8.1 release-packages workflow run.
  CARGO_DEB_VERSION: "^2.6"
  CARGO_GENERATE_RPM_VERSION: "^0.14"

jobs:
  # ============================================================
  # 1. Build the release binaries (shared between deb + rpm jobs)
  # ============================================================
  build:
    name: Build release binaries (x86_64)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # The workspace Cargo.toml stays at 0.1.0; the release version is the git
      # tag (cargo-dist was dropped — see the Cargo.toml note). Inject the tag
      # version so the built binary's `--version` matches the release.
      - name: Set workspace version from tag
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \"0.1.0\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Cargo.toml workspace version -> ${VERSION}"

      - uses: dtolnay/rust-toolchain@1.93.0

      - uses: Swatinem/rust-cache@v2
        with:
          key: packages-x86_64

      - name: Build xiaoguai-core + xiaoguai (release)
        run: |
          cargo build --release \
            --bin xiaoguai-core \
            --bin xiaoguai

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries-x86_64
          path: |
            target/release/xiaoguai-core
            target/release/xiaoguai
          retention-days: 1

      # Build the web UIs so the .deb/.rpm bundle them (the server serves
      # /usr/local/share/xiaoguai/static). admin-ui needs VITE_BASE=/admin/.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build web UIs
        working-directory: frontend
        run: |
          npm install -g pnpm@9.12.0
          pnpm install --frozen-lockfile
          pnpm --filter @xiaoguai/shared build
          pnpm --filter @xiaoguai/chat-ui build
          VITE_BASE=/admin/ pnpm --filter @xiaoguai/admin-ui build

      - name: Upload web UI dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: |
            frontend/chat-ui/dist
            frontend/admin-ui/dist
          retention-days: 1

  # ============================================================
  # 2. Build the .deb package
  # ============================================================
  deb:
    name: Build .deb (ubuntu-22.04 / amd64)
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # cargo-deb reads the package version from Cargo.toml — inject the tag
      # version so the .deb is named for the release, not the static 0.1.0.
      - name: Set workspace version from tag
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \"0.1.0\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Cargo.toml workspace version -> ${VERSION}"

      # Restore binaries from the build job so cargo-deb can find them.
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries-x86_64
          path: target/release

      # Restore the built web UIs (chat-ui/dist + admin-ui/dist) so the .deb
      # bundles them — see [package.metadata.deb] assets.
      - name: Download web UI dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend

      - name: Fix binary permissions
        run: chmod 0755 target/release/xiaoguai-core target/release/xiaoguai

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked --version ${{ env.CARGO_DEB_VERSION }}

      # Run from the package dir so CWD == the manifest dir. cargo-deb resolves
      # `assets` relative to the manifest dir but `extended-description-file`
      # relative to CWD; running here makes both bases identical, so every
      # `../../<repo-root-file>` path resolves consistently (a root-CWD run
      # failed: "unable to read extended description from file: ../../README.md").
      # --no-build: binaries already built above. cargo-deb writes to the
      # workspace target/debian/; copy into dist/.
      - name: Build .deb
        run: |
          mkdir -p dist
          (cd crates/xiaoguai-cli && cargo deb --no-build)
          cp target/debian/*.deb dist/

      - name: List dist/
        run: ls -lh dist/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: deb-amd64
          path: dist/*.deb
          if-no-files-found: error
          retention-days: 7

  # ============================================================
  # 3. Build the .rpm package
  # ============================================================
  rpm:
    name: Build .rpm (ubuntu-22.04 / amd64)
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # cargo-generate-rpm reads the package version from Cargo.toml — inject
      # the tag version so the .rpm is named for the release, not 0.1.0.
      - name: Set workspace version from tag
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \"0.1.0\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Cargo.toml workspace version -> ${VERSION}"

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries-x86_64
          path: target/release

      # Restore the built web UIs so the .rpm bundles them — see
      # [package.metadata.generate-rpm] assets.
      - name: Download web UI dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend

      - name: Fix binary permissions
        run: chmod 0755 target/release/xiaoguai-core target/release/xiaoguai

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked --version ${{ env.CARGO_GENERATE_RPM_VERSION }}

      - name: Build .rpm
        # cargo-generate-rpm's --output expects a FILE path; `--output dist/`
        # errored "Is a directory (os error 21)". Let it write to its default
        # target/generate-rpm/ and copy the .rpm into dist/.
        run: |
          mkdir -p dist
          cargo generate-rpm -p crates/xiaoguai-cli
          cp target/generate-rpm/*.rpm dist/

      - name: List dist/
        run: ls -lh dist/

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v7
        with:
          name: rpm-x86_64
          path: dist/*.rpm
          if-no-files-found: error
          retention-days: 7

  # ============================================================
  # 4a. Smoke-test the .deb in a fresh Ubuntu 22.04 container
  # ============================================================
  smoke-deb:
    name: Smoke — install .deb (ubuntu:22.04)
    needs: deb
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download .deb
        uses: actions/download-artifact@v8
        with:
          name: deb-amd64
          path: dist

      - name: Run deb smoke-test in Docker
        run: |
          DEB=$(ls dist/*.deb | head -1)
          docker run --rm \
            -v "$(pwd)/dist:/pkg:ro" \
            -v "$(pwd)/packaging/smoke.sh:/smoke.sh:ro" \
            ubuntu:22.04 \
            bash /smoke.sh deb "/pkg/$(basename "$DEB")"

  # ============================================================
  # 4b. Smoke-test the .rpm in a fresh Rocky Linux 9 container
  # ============================================================
  smoke-rpm:
    name: Smoke — install .rpm (rockylinux:9)
    needs: rpm
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download .rpm
        uses: actions/download-artifact@v8
        with:
          name: rpm-x86_64
          path: dist

      - name: Run rpm smoke-test in Docker
        run: |
          RPM=$(ls dist/*.rpm | head -1)
          docker run --rm \
            -v "$(pwd)/dist:/pkg:ro" \
            -v "$(pwd)/packaging/smoke.sh:/smoke.sh:ro" \
            rockylinux:9 \
            bash /smoke.sh rpm "/pkg/$(basename "$RPM")"

  # ============================================================
  # 5. Attach packages to the GitHub Release (tag pushes only)
  # ============================================================
  publish:
    name: Attach packages to release
    needs: [smoke-deb, smoke-rpm]
    runs-on: ubuntu-22.04
    # Only publish on real tag pushes; skip for workflow_dispatch dry-runs.
    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      github.event.inputs.dry_run != 'true'
    permissions:
      contents: write
    steps:
      - name: Download .deb
        uses: actions/download-artifact@v8
        with:
          name: deb-amd64
          path: dist

      - name: Download .rpm
        uses: actions/download-artifact@v8
        with:
          name: rpm-x86_64
          path: dist

      - name: Generate SHA256SUMS for packages
        run: |
          cd dist
          sha256sum *.deb *.rpm > SHA256SUMS-packages
          cat SHA256SUMS-packages

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS-packages
          fail_on_unmatched_files: true
