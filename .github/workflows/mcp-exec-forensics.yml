name: mcp-exec forensics (#243)

# Dedicated forensic harness for the intermittent +45-min xiaoguai-mcp-exec
# runner death (issue #243). Catches the hang IN THE ACT and dumps what the
# blocked process is waiting on (kernel stack / wchan / open fds / py-spy),
# pushing each snapshot to a beacon branch so it survives the runner's death.
#
# Does NOT run on normal pushes/PRs — only this branch + manual dispatch, so it
# never disrupts the gate. Runs the suite via the SAME path as the quarantine
# job (raw `nextest run`, no inner timeout) under main's config (PARALLEL — the
# condition the hang occurs in), so it reproduces the original failure.
#
# Beacon-bug fix this harness carries: the old quarantine beacon tracked
# `setsid`'s PID (which exits immediately after forking the worker), so its
# `kill -0` loop broke after a single beat — capturing only job-start, never
# the death. This monitor beats on a plain TIMER and detects completion via a
# sentinel file, so it keeps capturing all the way to the runner's death.
on:
  push:
    branches: [ci/mcp-exec-forensics]
  workflow_dispatch:

permissions:
  contents: write # forensic beacon pushes to refs/heads/ci-forensics-<run_id>

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_JOBS: "2"

jobs:
  forensics:
    name: mcp-exec hang forensics
    timeout-minutes: 115
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /
      - name: Add swap
        run: |
          sudo fallocate -l 8G /swapfile2 && sudo chmod 600 /swapfile2 \
            && sudo mkswap /swapfile2 && sudo swapon /swapfile2 || true
          free -h
      - name: Install mold
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - uses: Swatinem/rust-cache@v2
      - name: Install py-spy (best-effort; wchan/stack still work without it)
        run: pip install --user py-spy || pipx install py-spy || true
      - name: Build nextest archive (workspace feature unification, like the gate)
        run: >
          mold -run cargo nextest archive --workspace --locked --build-jobs 1
          --archive-file target/nextest-tests.tar.zst
      - name: Loop mcp-exec with live forensics
        timeout-minutes: 100
        run: |
          set -uo pipefail
          git config user.email forensics@localhost
          git config user.name forensics
          BEACON="ci-forensics-${GITHUB_RUN_ID}"
          DONE=/tmp/forensics.done
          : > /tmp/suite.log
          export PATH="$HOME/.local/bin:$PATH"

          # Background worker: run mcp-exec up to 6× via raw nextest (NO inner
          # timeout — let a hang develop fully). Each healthy run is seconds.
          (
            for r in $(seq 1 6); do
              echo "===== suite run $r start $(date -u +%FT%TZ) =====" >> /tmp/suite.log
              setsid cargo nextest run \
                --archive-file target/nextest-tests.tar.zst --workspace-remap . \
                -E 'package(xiaoguai-mcp-exec)' --profile ci --no-tests=pass \
                >> /tmp/suite.log 2>&1 < /dev/null
              echo "===== suite run $r rc=$? $(date -u +%FT%TZ) =====" >> /tmp/suite.log
            done
            touch "$DONE"
          ) &

          beat() {
            echo "===== beat $1 $(date -u +%FT%TZ) ====="
            echo "-- free --"; free -m
            echo "-- procs (cargo/nextest/python/test tree) --"
            ps -eo pid,ppid,pgid,stat,wchan:28,etimes,pcpu,rss,comm,args --forest 2>/dev/null \
              | grep -Ei 'nextest|python3|cargo|main\.py|xg-exec|mcp.exec|run-test|/tmp/nextest|deno|node' \
              | grep -v grep
            echo "-- busy (R/D) process kstacks + fds --"
            for p in $(ps -eo pid,stat,comm 2>/dev/null \
                | awk '$2 ~ /[RD]/ && $3 !~ /Runner|docker|containerd|waagent|provjobd|multipathd|php|systemd|kworker/ {print $1}'); do
              echo "  [pid $p] state=$(awk '/^State/{print $2}' /proc/$p/status 2>/dev/null) name=$(cat /proc/$p/comm 2>/dev/null) wchan=$(cat /proc/$p/wchan 2>/dev/null)"
              echo "   cmd: $(tr '\0' ' ' < /proc/$p/cmdline 2>/dev/null | cut -c1-180)"
              echo "   kstack:"; sudo cat /proc/$p/stack 2>/dev/null | sed 's/^/     /' | head -25
              echo "   fds:"; sudo ls -l /proc/$p/fd 2>/dev/null | sed 's/^/     /' | head -30
            done
            echo "-- py-spy on python3 (if installed) --"
            for pp in $(pgrep -x python3 2>/dev/null); do
              echo "  [py $pp] $(tr '\0' ' ' < /proc/$pp/cmdline 2>/dev/null | cut -c1-140)"
              sudo "$(command -v py-spy)" dump --pid "$pp" 2>&1 | sed 's/^/     /' | head -40
            done
            echo "-- all D-state --"; ps -eo pid,stat,wchan:28,comm 2>/dev/null | awk '$2 ~ /D/' | head
            echo "-- suite.log tail --"; tail -c 3500 /tmp/suite.log 2>/dev/null
          }

          for i in $(seq 1 190); do
            if [ -f "$DONE" ]; then echo "ALL 6 SUITE RUNS COMPLETED — no hang captured this job"; break; fi
            beat "$i" > /tmp/beacon.txt 2>&1 || true
            cp /tmp/beacon.txt beacon.txt
            git add -f beacon.txt >/dev/null 2>&1 || true
            git commit -qm "forensics beat $i $(date -u +%FT%TZ)" >/dev/null 2>&1 || true
            git push -qf origin "HEAD:refs/heads/$BEACON" >/dev/null 2>&1 || true
            sleep 30
          done
          echo "=== monitor ended; final suite.log tail ==="
          tail -c 10000 /tmp/suite.log || true
