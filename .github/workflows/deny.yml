name: License & Dependency check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# v1.1.8: promoted from advisory-only to gating.
# A failure here now blocks PR merge — see deny.toml for the
# license allow-list + advisory ignore list.
jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Run cargo-deny on the runner (not the action's container) so it uses the
      # repo's pinned toolchain. The EmbarkStudios/cargo-deny-action@v2 image
      # regressed (2026-07): it can't honor `rust-toolchain.toml`'s 1.93.0 pin
      # ("override toolchain '1.93.0' is not installed"), reddening every PR.
      # This mirrors the rust.yml idiom (dtolnay + taiki-e install-action).
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      # NB: --all-features is a global cargo-deny flag — it must precede the
      # `check` subcommand (after it, clap rejects it with "unexpected argument").
      - run: cargo deny --all-features --log-level warn check
