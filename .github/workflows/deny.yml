name: License & Dependency check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# v1.1.8: promoted from advisory-only to gating.
# A failure here now blocks PR merge — see deny.toml for the
# license allow-list + advisory ignore list.
jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
          arguments: --all-features
