apiVersion: v2
name: xiaoguai-observability
description: >
  Optional observability sub-chart for Xiaoguai: bundles kube-prometheus-stack,
  Loki, and Tempo with pre-provisioned Grafana datasources, dashboards, alert
  rules, and a ServiceMonitor targeting xiaoguai-core /metrics.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.28.0-0"
home: https://github.com/xiaoguai-agent/xiaoguai
sources:
  - https://github.com/xiaoguai-agent/xiaoguai

maintainers:
  - name: Xiaoguai Maintainers

dependencies:
  # kube-prometheus-stack bundles Prometheus, Alertmanager, and Grafana.
  # https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
  - name: kube-prometheus-stack
    version: "60.4.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheusStack.enabled

  # Loki — log aggregation.
  # https://github.com/grafana/helm-charts/tree/main/charts/loki
  - name: loki
    version: "6.7.4"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled

  # Tempo — distributed tracing.
  # https://github.com/grafana/helm-charts/tree/main/charts/tempo
  - name: tempo
    version: "1.10.3"
    repository: "https://grafana.github.io/helm-charts"
    condition: tempo.enabled
