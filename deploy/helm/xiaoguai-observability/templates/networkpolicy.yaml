{{- if .Values.networkPolicy.enabled }}
# NetworkPolicy — restricts cross-namespace traffic so that:
#   - Prometheus may scrape xiaoguai-core in .Values.global.xiaoguaiNamespace
#   - Grafana may reach Prometheus, Loki, and Tempo within this namespace
#   - No other cross-namespace ingress is permitted by default
#
# Requires a CNI plugin that honours NetworkPolicy (Cilium, Calico, etc.).

# ---- Allow Prometheus to scrape xiaoguai-core in xiaoguai namespace ----
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "xiaoguai-observability.fullname" . }}-prometheus-scrape-xiaoguai
  namespace: {{ include "xiaoguai-observability.xiaoguaiNamespace" . }}
  labels:
    {{- include "xiaoguai-observability.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: xiaoguai
  policyTypes:
    - Ingress
  ingress:
    # Allow Prometheus (from monitoring namespace) to scrape /metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 8080
          protocol: TCP

---
# ---- Restrict ingress/egress within the observability namespace --------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "xiaoguai-observability.fullname" . }}-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xiaoguai-observability.labels" . | nindent 4 }}
spec:
  # Apply to all pods in this namespace.
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow same-namespace traffic (Grafana → Prometheus, Grafana → Loki, etc.)
    - from:
        - podSelector: {}
    # Allow ingress from xiaoguai namespace (for service discovery / UI proxying)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "xiaoguai-observability.xiaoguaiNamespace" . }}
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Same-namespace: Grafana → Prometheus/Loki/Tempo, Prometheus → Loki, etc.
    - to:
        - podSelector: {}
    # Prometheus must reach xiaoguai-core to scrape metrics
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "xiaoguai-observability.xiaoguaiNamespace" . }}
      ports:
        - port: 8080
          protocol: TCP
    # Alertmanager must reach external receivers (Slack, PagerDuty, SMTP)
    - ports:
        - port: 443
          protocol: TCP
        - port: 587
          protocol: TCP
{{- end }}
