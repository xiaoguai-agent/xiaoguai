{{- if and .Values.prometheusStack.enabled .Values.serviceMonitor.enabled }}
# ServiceMonitor — instructs Prometheus (via kube-prometheus-stack's operator)
# to scrape the xiaoguai-core /metrics endpoint.
#
# Targets the Service created by the main xiaoguai chart in the namespace
# specified by .Values.global.xiaoguaiNamespace (default: "default").
# The Service must expose a port named "http" (default in xiaoguai chart).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "xiaoguai-observability.fullname" . }}-xiaoguai-core
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xiaoguai-observability.labels" . | nindent 4 }}
    # kube-prometheus-stack discovers ServiceMonitors via this label by default.
    release: {{ .Release.Name }}
spec:
  # Target the xiaoguai-core Service in its own namespace.
  namespaceSelector:
    matchNames:
      - {{ include "xiaoguai-observability.xiaoguaiNamespace" . | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/name: xiaoguai
      app.kubernetes.io/instance: {{ include "xiaoguai-observability.xiaoguaiRelease" . | quote }}
  endpoints:
    - port: {{ .Values.serviceMonitor.port | quote }}
      path: {{ .Values.serviceMonitor.path | quote }}
      interval: {{ .Values.serviceMonitor.interval | quote }}
      scrapeTimeout: "10s"
      # Add a job label for easy filtering in Grafana.
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: kubernetes_namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: kubernetes_pod_name
      # Metric relabeling — drop high-cardinality internal metrics.
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "go_.*|process_.*"
          action: drop
{{- end }}
