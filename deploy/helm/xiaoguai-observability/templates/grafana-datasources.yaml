{{- if and .Values.prometheusStack.enabled .Values.grafanaDatasources.enabled }}
# Grafana datasources provisioned via the grafana-sc-datasources sidecar.
# The sidecar watches ConfigMaps with label grafana_datasource=1 across all
# namespaces and hot-reloads them into Grafana without a restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "xiaoguai-observability.fullname" . }}-datasources
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xiaoguai-observability.labels" . | nindent 4 }}
    # This label triggers the Grafana sidecar to pick up the datasources.
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      # ----------------------------------------------------------------
      # Prometheus — primary metrics source
      # ----------------------------------------------------------------
      - name: Prometheus
        type: prometheus
        uid: xiaoguai-prometheus
        url: {{ include "xiaoguai-observability.prometheusUrl" . }}
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          httpMethod: POST
          prometheusType: Prometheus
          prometheusVersion: "2.51.0"
          timeInterval: "30s"
          exemplarTraceIdDestinations:
            - name: traceID
              datasourceUid: xiaoguai-tempo

      # ----------------------------------------------------------------
      # Loki — log aggregation
      # ----------------------------------------------------------------
      {{- if .Values.loki.enabled }}
      - name: Loki
        type: loki
        uid: xiaoguai-loki
        url: {{ include "xiaoguai-observability.lokiUrl" . }}
        access: proxy
        editable: false
        jsonData:
          derivedFields:
            - datasourceUid: xiaoguai-tempo
              matcherRegex: "trace_id=(\\w+)"
              name: TraceID
              url: "${__value.raw}"
      {{- end }}

      # ----------------------------------------------------------------
      # Tempo — distributed tracing
      # ----------------------------------------------------------------
      {{- if .Values.tempo.enabled }}
      - name: Tempo
        type: tempo
        uid: xiaoguai-tempo
        url: {{ include "xiaoguai-observability.tempoUrl" . }}
        access: proxy
        editable: false
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: xiaoguai-prometheus
          search:
            hide: false
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: xiaoguai-loki
      {{- end }}
{{- end }}
