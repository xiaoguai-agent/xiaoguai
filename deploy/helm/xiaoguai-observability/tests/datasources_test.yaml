# helm-unittest tests for grafana-datasources.yaml
# Run: helm unittest deploy/helm/xiaoguai-observability/
suite: grafana-datasources
templates:
  - grafana-datasources.yaml

tests:
  - it: "creates a ConfigMap when prometheusStack and grafanaDatasources are enabled"
    set:
      prometheusStack.enabled: true
      grafanaDatasources.enabled: true
      loki.enabled: true
      tempo.enabled: true
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.labels["grafana_datasource"]
          value: "1"
      - matchSnapshot:
          path: metadata.name

  - it: "ConfigMap data contains datasources.yaml key"
    set:
      prometheusStack.enabled: true
      grafanaDatasources.enabled: true
    asserts:
      - isNotNull:
          path: data["datasources.yaml"]

  - it: "datasources.yaml includes Prometheus datasource entry"
    set:
      prometheusStack.enabled: true
      grafanaDatasources.enabled: true
    asserts:
      - matchRegex:
          path: data["datasources.yaml"]
          pattern: "name: Prometheus"

  - it: "datasources.yaml includes Loki when loki.enabled=true"
    set:
      prometheusStack.enabled: true
      grafanaDatasources.enabled: true
      loki.enabled: true
    asserts:
      - matchRegex:
          path: data["datasources.yaml"]
          pattern: "name: Loki"

  - it: "datasources.yaml excludes Loki when loki.enabled=false"
    set:
      prometheusStack.enabled: true
      grafanaDatasources.enabled: true
      loki.enabled: false
      tempo.enabled: false
    asserts:
      - notMatchRegex:
          path: data["datasources.yaml"]
          pattern: "name: Loki"

  - it: "datasources.yaml includes Tempo when tempo.enabled=true"
    set:
      prometheusStack.enabled: true
      grafanaDatasources.enabled: true
      loki.enabled: false
      tempo.enabled: true
    asserts:
      - matchRegex:
          path: data["datasources.yaml"]
          pattern: "name: Tempo"

  - it: "renders no ConfigMap when prometheusStack.enabled=false"
    set:
      prometheusStack.enabled: false
      grafanaDatasources.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: "renders no ConfigMap when grafanaDatasources.enabled=false"
    set:
      prometheusStack.enabled: true
      grafanaDatasources.enabled: false
    asserts:
      - hasDocuments:
          count: 0
