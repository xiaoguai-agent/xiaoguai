suite: Cloud LLM v2 provider env var projection
templates:
  - templates/deployment.yaml

tests:
  - it: should inject Bedrock credential env vars when secrets.bedrock is set
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      secrets.bedrock: xiaoguai-bedrock
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BEDROCK_AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: xiaoguai-bedrock
                key: BEDROCK_AWS_ACCESS_KEY_ID
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BEDROCK_AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: xiaoguai-bedrock
                key: BEDROCK_AWS_SECRET_ACCESS_KEY
                optional: true

  - it: should NOT inject Bedrock credential env vars when secrets.bedrock is empty
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      secrets.bedrock: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: BEDROCK_AWS_ACCESS_KEY_ID

  - it: should inject Bedrock region + authMode from bedrock.region when set
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      bedrock.region: "eu-west-1"
      bedrock.authMode: "env-keys"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BEDROCK_REGION
            value: "eu-west-1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BEDROCK_AUTH_MODE
            value: "env-keys"

  - it: should inject Azure OpenAI API key env var when secrets.azureOpenai is set
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      secrets.azureOpenai: xiaoguai-azure-openai
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: xiaoguai-azure-openai
                key: AZURE_OPENAI_API_KEY

  - it: should inject Azure OpenAI non-secret config when azureOpenai.endpoint is set
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      azureOpenai.endpoint: "https://myresource.openai.azure.com/"
      azureOpenai.deploymentId: "gpt-4o"
      azureOpenai.apiVersion: "2024-02-01"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_OPENAI_ENDPOINT
            value: "https://myresource.openai.azure.com/"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_OPENAI_DEPLOYMENT_ID
            value: "gpt-4o"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_OPENAI_API_VERSION
            value: "2024-02-01"

  - it: should NOT inject Azure OpenAI config env vars when endpoint is empty
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      azureOpenai.endpoint: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_OPENAI_ENDPOINT

  - it: should inject MISTRAL_API_KEY when secrets.mistral is set
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      secrets.mistral: xiaoguai-mistral
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MISTRAL_API_KEY
            valueFrom:
              secretKeyRef:
                name: xiaoguai-mistral
                key: MISTRAL_API_KEY

  - it: should NOT inject MISTRAL_API_KEY when secrets.mistral is empty
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      secrets.mistral: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: MISTRAL_API_KEY

  - it: should inject GROQ_API_KEY when secrets.groq is set
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      secrets.groq: xiaoguai-groq
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GROQ_API_KEY
            valueFrom:
              secretKeyRef:
                name: xiaoguai-groq
                key: GROQ_API_KEY

  - it: should NOT inject GROQ_API_KEY when secrets.groq is empty
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      secrets.groq: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GROQ_API_KEY
