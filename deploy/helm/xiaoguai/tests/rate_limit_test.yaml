suite: Rate limit env var projection
templates:
  - templates/deployment.yaml

tests:
  - it: should NOT inject rate limit env vars when rateLimit.enabled=false
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      rateLimit.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: RATE_LIMIT_ENABLED
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: RATE_LIMIT_BACKEND

  - it: should inject all rate limit env vars when enabled with in-mem backend
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      rateLimit.enabled: true
      rateLimit.backend: "in-mem"
      rateLimit.perTenantRequests: 100
      rateLimit.perTenantWindowSeconds: 60
      rateLimit.perRouteRequests: 30
      rateLimit.perRouteWindowSeconds: 10
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RATE_LIMIT_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RATE_LIMIT_BACKEND
            value: "in-mem"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RATE_LIMIT_PER_TENANT_REQUESTS
            value: "100"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RATE_LIMIT_PER_TENANT_WINDOW_SECONDS
            value: "60"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RATE_LIMIT_PER_ROUTE_REQUESTS
            value: "30"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RATE_LIMIT_PER_ROUTE_WINDOW_SECONDS
            value: "10"

  - it: should inject redis as RATE_LIMIT_BACKEND when backend=redis
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      rateLimit.enabled: true
      rateLimit.backend: "redis"
      rateLimit.perTenantRequests: 200
      rateLimit.perTenantWindowSeconds: 60
      rateLimit.perRouteRequests: 50
      rateLimit.perRouteWindowSeconds: 10
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RATE_LIMIT_BACKEND
            value: "redis"
