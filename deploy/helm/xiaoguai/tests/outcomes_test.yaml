suite: Outcomes env var projection
templates:
  - templates/deployment.yaml

tests:
  - it: should always inject OUTCOMES_RETENTION_DAYS and OUTCOMES_TIMESERIES_BUCKET_SECONDS
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      outcomes.retentionDays: 30
      outcomes.timeseriesBucketSeconds: 300
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OUTCOMES_RETENTION_DAYS
            value: "30"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OUTCOMES_TIMESERIES_BUCKET_SECONDS
            value: "300"

  - it: should NOT inject OUTCOMES_BACKEND when backend is in-mem (default)
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      outcomes.backend: "in-mem"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OUTCOMES_BACKEND

  - it: should inject OUTCOMES_BACKEND when backend is pg
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      outcomes.backend: "pg"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OUTCOMES_BACKEND
            value: "pg"

  - it: should project custom retention and bucket size values
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      outcomes.retentionDays: 90
      outcomes.timeseriesBucketSeconds: 60
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OUTCOMES_RETENTION_DAYS
            value: "90"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OUTCOMES_TIMESERIES_BUCKET_SECONDS
            value: "60"
