suite: Skills / packs env var projection
templates:
  - templates/deployment.yaml

tests:
  - it: should always inject SKILLS_AUTO_INSTALL_ON_STARTUP
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      skills.autoInstallOnStartup: false
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SKILLS_AUTO_INSTALL_ON_STARTUP
            value: "false"

  - it: should inject SKILLS_PACKS_CONFIG_PATH when packsConfigPath is set
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      skills.packsConfigPath: "/etc/xiaoguai/packs.yaml"
      skills.autoInstallOnStartup: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SKILLS_PACKS_CONFIG_PATH
            value: "/etc/xiaoguai/packs.yaml"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SKILLS_AUTO_INSTALL_ON_STARTUP
            value: "true"

  - it: should NOT inject SKILLS_PACKS_CONFIG_PATH when packsConfigPath is empty
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      skills.packsConfigPath: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SKILLS_PACKS_CONFIG_PATH

  - it: should inject SKILLS_INSTALL_ALLOWLIST when set
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      skills.installAllowlist: "devops-oncall,customer-success"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SKILLS_INSTALL_ALLOWLIST
            value: "devops-oncall,customer-success"

  - it: should NOT inject SKILLS_INSTALL_ALLOWLIST when allowlist is empty
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      skills.installAllowlist: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SKILLS_INSTALL_ALLOWLIST
