suite: HotL env var projection
templates:
  - templates/deployment.yaml

tests:
  - it: should inject HOTL_ENABLED env vars when hotl.enabled=true
    set:
      hotl.enabled: true
      hotl.policyStoreBackend: "pg"
      hotl.enforcementEnabled: true
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOTL_POLICY_STORE_BACKEND
            value: "pg"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOTL_ENFORCEMENT_ENABLED
            value: "true"

  - it: should NOT inject HOTL env vars when hotl.enabled=false
    set:
      hotl.enabled: false
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
    asserts:
      - hasDocuments:
          count: 1
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOTL_POLICY_STORE_BACKEND
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOTL_ENFORCEMENT_ENABLED

  - it: should inject Slack escalation URL when set and hotl.enabled=true
    set:
      hotl.enabled: true
      hotl.policyStoreBackend: "pg"
      hotl.slackEscalationWebhookUrl: "https://hooks.slack.com/services/T000/B000/xxx"
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOTL_ESCALATION_SLACK_WEBHOOK_URL
            value: "https://hooks.slack.com/services/T000/B000/xxx"

  - it: should NOT inject escalation vars when hotl.enabled=false even if slackWebhookUrl set
    set:
      hotl.enabled: false
      hotl.slackEscalationWebhookUrl: "https://hooks.slack.com/services/T000/B000/xxx"
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOTL_ESCALATION_SLACK_WEBHOOK_URL

  - it: should inject email escalation address when set and hotl.enabled=true
    set:
      hotl.enabled: true
      hotl.policyStoreBackend: "in-mem"
      hotl.emailEscalationAddress: "oncall@example.com"
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOTL_ESCALATION_EMAIL_ADDRESS
            value: "oncall@example.com"

  - it: should inject webhook escalation URL when set and hotl.enabled=true
    set:
      hotl.enabled: true
      hotl.policyStoreBackend: "pg"
      hotl.webhookEscalationUrl: "https://webhook.example.com/hotl"
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOTL_ESCALATION_WEBHOOK_URL
            value: "https://webhook.example.com/hotl"
