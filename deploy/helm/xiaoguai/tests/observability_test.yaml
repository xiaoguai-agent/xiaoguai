suite: Observability env var projection
templates:
  - templates/deployment.yaml

tests:
  - it: should inject OTEL env vars when observability.otel.enabled=true
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      observability.otel.enabled: true
      observability.otel.endpoint: "http://otel-collector:4317"
      observability.otel.tracesSamplingRatio: "0.5"
      observability.otel.serviceName: "xiaoguai-prod"
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://otel-collector:4317"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_TRACES_SAMPLER_ARG
            value: "0.5"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_SERVICE_NAME
            value: "xiaoguai-prod"

  - it: should NOT inject OTEL env vars when observability.otel.enabled=false
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      observability.otel.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_ENDPOINT
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_TRACES_SAMPLER_ARG

  - it: should inject PROMETHEUS_LISTEN_ADDR when prometheus.enabled=true
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      observability.prometheus.enabled: true
      observability.prometheus.listenAddr: "0.0.0.0:9090"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROMETHEUS_LISTEN_ADDR
            value: "0.0.0.0:9090"

  - it: should NOT inject PROMETHEUS_LISTEN_ADDR when prometheus.enabled=false
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      observability.prometheus.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: PROMETHEUS_LISTEN_ADDR

  - it: should inject default sample rate when otel enabled with default tracesSamplingRatio
    set:
      secrets.database: xiaoguai-database
      secrets.cache: xiaoguai-cache
      secrets.auth: xiaoguai-auth
      secrets.audit: xiaoguai-audit
      observability.otel.enabled: true
      observability.otel.endpoint: "http://otel-collector:4317"
      observability.otel.tracesSamplingRatio: "0.1"
      observability.otel.serviceName: "xiaoguai"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_TRACES_SAMPLER_ARG
            value: "0.1"
