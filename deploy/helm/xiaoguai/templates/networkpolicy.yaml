{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "xiaoguai.fullname" . }}
  labels:
    {{- include "xiaoguai.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "xiaoguai.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  # ---- Ingress rules ------------------------------------------------
  ingress:
    # Always allow same-namespace traffic (e.g. ingress controllers, Prometheus)
    - from:
        - podSelector: {}
    {{- range .Values.networkPolicy.ingressFromNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
    {{- end }}

  # ---- Egress rules -------------------------------------------------
  egress:
    {{- if .Values.networkPolicy.allowDNSEgress }}
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- end }}
    # In-cluster traffic: Postgres, Valkey, Kubernetes API
    - to:
        - podSelector: {}
    # LLM provider API endpoints
    {{- if .Values.networkPolicy.egressLLMCidrs }}
    - to:
        {{- range .Values.networkPolicy.egressLLMCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - port: 443
          protocol: TCP
    {{- end }}
{{- end }}
