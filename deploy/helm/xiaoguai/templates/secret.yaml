{{- if .Values.createSecret -}}
# CAUTION: chart-managed secrets are intended for non-production / CI use only.
# In production, pre-create secrets externally (Vault, external-secrets, SealedSecrets)
# and reference them via .Values.secrets.* without setting createSecret=true.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "xiaoguai.secretName" . }}
  labels:
    {{- include "xiaoguai.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Database
  url: {{ .Values.secretValues.databaseUrl | quote }}
  # Cache — placed in a separate section so operators can scope RBAC
  # access to individual secrets in production.
  cache-url: {{ .Values.secretValues.cacheUrl | quote }}
  # Auth
  issuer:   {{ .Values.secretValues.authIssuer | quote }}
  audience: {{ .Values.secretValues.authAudience | quote }}
  jwks_url: {{ .Values.secretValues.authJwksUrl | quote }}
  # Audit
  hmac_key: {{ .Values.secretValues.auditHmacKey | quote }}
{{- end }}
