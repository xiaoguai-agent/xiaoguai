# Default Xiaoguai chart values.
#
# Postgres + Valkey are NOT bundled as sub-charts — production operators
# almost always run managed instances or already-existing clusters. Supply
# connection URLs via pre-created Secrets referenced by name below.
#
# Quick-start overrides:
#   helm install xiaoguai deploy/helm/xiaoguai \
#     --set secrets.database=my-db-secret \
#     --set secrets.cache=my-cache-secret \
#     --set ingress.enabled=true \
#     --set ingress.hosts[0].host=ai.example.com

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/xiaoguai-agent/xiaoguai
  tag: ""                  # empty = chart appVersion
  pullPolicy: IfNotPresent
  pullSecrets: []          # list of imagePullSecret names

# ---------------------------------------------------------------------------
# Replicas
# ---------------------------------------------------------------------------
replicaCount: 2

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 2
    memory: 2Gi

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  # headless: set to true to also create a headless Service (useful for
  # StatefulSet-style DNS discovery or Prometheus scraping via pod IPs).
  headless: false

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  #   kubernetes.io/ingress.class: nginx
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: xiaoguai.example.com
      paths: ["/"]
  tls: []
  #   - secretName: xiaoguai-tls
  #     hosts: [xiaoguai.example.com]

# ---------------------------------------------------------------------------
# External Secrets — pre-created by the operator before helm install.
# Each value is the name of a Kubernetes Secret; the chart reads specific
# keys from each secret (see templates/deployment.yaml).
# ---------------------------------------------------------------------------
secrets:
  database: xiaoguai-database   # required key: url
  cache:    xiaoguai-cache       # required key: url
  auth:     xiaoguai-auth        # required keys: issuer, audience, jwks_url
  audit:    xiaoguai-audit       # required key: hmac_key
  # Optional — LLM provider API keys. Set to the name of a pre-created
  # Secret that contains any of: ANTHROPIC_API_KEY, OPENAI_API_KEY,
  # DEEPSEEK_API_KEY, GEMINI_API_KEY, ZHIPU_API_KEY.
  # Leave empty ("") to skip; the chart will not mount env vars for
  # keys that are not present.
  llm: ""                        # e.g. xiaoguai-llm-keys
  # Optional — if set, an additional read-only DB URL is mounted for
  # read-replica routing (v1.1.4.1+).
  databaseRead: ""               # keys: url

  # ---------------------------------------------------------------------------
  # Wave-3 secrets — all optional, leave "" to skip mounting the env var.
  # Pre-create the referenced Secret with the keys listed in the comment.
  # ---------------------------------------------------------------------------

  # Cloud LLM v2 providers
  # Key: BEDROCK_AWS_ACCESS_KEY_ID, BEDROCK_AWS_SECRET_ACCESS_KEY
  bedrock: ""
  # Key: AZURE_OPENAI_API_KEY
  azureOpenai: ""
  # Key: MISTRAL_API_KEY
  mistral: ""
  # Key: GROQ_API_KEY
  groq: ""

  # IM adapter bot tokens / signing secrets
  # Key: DISCORD_BOT_TOKEN
  discord: ""
  # Key: TELEGRAM_BOT_TOKEN
  telegram: ""
  # Key: MATTERMOST_BOT_TOKEN
  mattermost: ""
  # Key: SLACK_BOT_TOKEN, SLACK_SIGNING_SECRET
  slack: ""

# ---------------------------------------------------------------------------
# createSecret — convenience for non-production / CI environments.
# When true, the chart creates a Secret from the plaintext values below.
# In production ALWAYS leave this false and pre-create secrets externally
# (Vault, external-secrets-operator, SealedSecrets, etc.).
# ---------------------------------------------------------------------------
createSecret: false
secretValues:
  databaseUrl: "postgres://xiaoguai:changeme@postgres:5432/xiaoguai"
  cacheUrl:    "redis://valkey:6379"
  authIssuer:  "https://auth.example.com"
  authAudience: "xiaoguai"
  authJwksUrl:  "https://auth.example.com/.well-known/jwks.json"
  auditHmacKey: "change-me-in-production"

# ---------------------------------------------------------------------------
# ConfigMap — non-secret runtime configuration.
# Values here are injected as XIAOGUAI_* env vars (key format:
# XIAOGUAI_<SECTION>__<KEY>). Extend as needed.
# ---------------------------------------------------------------------------
config:
  XIAOGUAI_SERVER__HOST: "0.0.0.0"
  XIAOGUAI_SERVER__PORT: "8080"
  RUST_LOG: "info,sqlx=warn"

# ---------------------------------------------------------------------------
# Extra env vars injected verbatim into the pod (key: value pairs).
# Use this for ad-hoc overrides; prefer config: above for structured config.
# ---------------------------------------------------------------------------
env: {}

# ---------------------------------------------------------------------------
# Pod security
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# ---------------------------------------------------------------------------
# Probes
# ---------------------------------------------------------------------------
probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Horizontal Pod Autoscaler
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Pod Anti-Affinity — keeps replicas on separate nodes for HA.
# ---------------------------------------------------------------------------
podAntiAffinity:
  enabled: true
  # "soft" = preferredDuringSchedulingIgnoredDuringExecution (won't block scheduling)
  # "hard" = requiredDuringSchedulingIgnoredDuringExecution  (strict; may prevent scheduling)
  mode: soft
  topologyKey: kubernetes.io/hostname

# ---------------------------------------------------------------------------
# Pod Disruption Budget
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  # Set to true to install a NetworkPolicy that restricts ingress/egress.
  # Requires a CNI plugin that honours NetworkPolicy (Cilium, Calico, etc.).
  enabled: false
  # Namespaces whose pods are allowed to reach xiaoguai on the http port.
  # Empty list = only same-namespace ingress.
  ingressFromNamespaces: []
  # CIDR blocks the app is allowed to reach for outbound LLM API calls.
  # Add your cloud NAT gateway IPs or the CIDRs of your LLM provider.
  egressLLMCidrs:
    - 0.0.0.0/0   # permissive default; tighten in production
  # Whether to allow unrestricted DNS egress (udp/tcp 53). Usually needed.
  allowDNSEgress: true

# ---------------------------------------------------------------------------
# Annotations / Labels
# ---------------------------------------------------------------------------
podAnnotations: {}
commonLabels: {}

# =============================================================================
# Wave-3 subsystem configuration
# All subsystems are disabled by default; enable individually as needed.
# =============================================================================

# ---------------------------------------------------------------------------
# HotL — policy store and enforcement engine.
# HOTL_* env vars.
# ---------------------------------------------------------------------------
hotl:
  # Enable the HotL enforcement engine.
  enabled: false
  # Backend for the policy store: "pg" (Postgres, recommended) or "in-mem".
  policyStoreBackend: "pg"
  # Whether enforcement decisions are applied (true) or audit-only (false).
  enforcementEnabled: false
  # Escalation channels — set to non-empty strings to activate.
  # Slack workspace hook URL for policy violations (non-secret, a channel URL).
  slackEscalationWebhookUrl: ""
  # E-mail address to send escalation alerts to.
  emailEscalationAddress: ""
  # Generic webhook URL for policy violation events.
  webhookEscalationUrl: ""

# ---------------------------------------------------------------------------
# Outcomes — recorder for agent run results and metrics.
# OUTCOMES_* env vars.
# ---------------------------------------------------------------------------
outcomes:
  # Recorder backend: "pg" (Postgres) or "in-mem" (ephemeral, non-HA).
  backend: "in-mem"
  # How many days to retain outcome records before expiry.
  retentionDays: 30
  # Bucket size (seconds) for time-series aggregation windows.
  timeseriesBucketSeconds: 300

# ---------------------------------------------------------------------------
# Skills / packs — skill pack management.
# SKILLS_* env vars.
# ---------------------------------------------------------------------------
skills:
  # Absolute path (in the container) to the packs config file.
  # Mount a ConfigMap / PVC there if you need custom packs.
  packsConfigPath: ""
  # Comma-separated list of pack IDs allowed to be installed.
  # Empty string = allow all packs in packsConfigPath.
  installAllowlist: ""
  # Auto-install packs from the allow-list on startup.
  autoInstallOnStartup: false

# ---------------------------------------------------------------------------
# Rate limiting.
# RATE_LIMIT_* env vars.
# ---------------------------------------------------------------------------
rateLimit:
  # Enable the rate-limit middleware.
  enabled: false
  # Backend: "in-mem" (single-replica only) or "redis" (uses secrets.cache URL).
  backend: "in-mem"
  # Per-tenant limits
  perTenantRequests: 100       # requests per window
  perTenantWindowSeconds: 60
  # Per-route limits (overrides per-tenant for matching routes)
  perRouteRequests: 30
  perRouteWindowSeconds: 10

# ---------------------------------------------------------------------------
# Cloud LLM v2 providers.
# Credentials are always loaded from secrets.* above (never put keys here).
# BEDROCK_*, AZURE_OPENAI_*, MISTRAL_*, GROQ_* env vars.
# ---------------------------------------------------------------------------
bedrock:
  # AWS region for Bedrock API calls.
  region: "us-east-1"
  # Auth mode: "env-keys" (BEDROCK_AWS_ACCESS_KEY_ID/SECRET) or "irsa" (pod IRSA).
  authMode: "irsa"

azureOpenai:
  # Azure OpenAI resource endpoint, e.g. https://<resource>.openai.azure.com/
  endpoint: ""
  # Deployment ID / model deployment name in the Azure OpenAI resource.
  deploymentId: ""
  # API version string, e.g. "2024-02-01".
  apiVersion: "2024-02-01"

mistral:
  # Mistral API base URL (leave empty to use the default public endpoint).
  apiBase: ""

groq:
  # Groq API base URL (leave empty to use the default public endpoint).
  apiBase: ""

# ---------------------------------------------------------------------------
# Observability — OpenTelemetry + Prometheus.
# OTEL_*, PROMETHEUS_* env vars.
# ---------------------------------------------------------------------------
observability:
  otel:
    # Enable OTLP trace/metric export.
    enabled: false
    # OTLP gRPC endpoint, e.g. http://otel-collector:4317
    endpoint: ""
    # Fraction of traces to sample (0.0 – 1.0).
    tracesSamplingRatio: "0.1"
    # Service name reported in spans.
    serviceName: "xiaoguai"
  prometheus:
    # Expose a /metrics endpoint on the given address.
    enabled: false
    # Bind address for the Prometheus scrape listener.
    listenAddr: "0.0.0.0:9090"

# ---------------------------------------------------------------------------
# IM adapters — wave-3 additions: Discord, Telegram, Mattermost.
# Slack bot-token support (secrets.slack) is also new in wave-3.
# Credentials are loaded from secrets.* above.
# ---------------------------------------------------------------------------
discord:
  # Enable the Discord bot adapter.
  enabled: false
  # Comma-separated list of channel IDs the bot is allowed to post in.
  # Empty = all channels the bot has access to.
  channelAllowlist: ""
  # Webhook signing secret for Discord interaction events (non-token secret).
  # If non-empty the chart mounts DISCORD_WEBHOOK_SECRET from secrets.discord.
  webhookSigningEnabled: false

telegram:
  # Enable the Telegram bot adapter.
  enabled: false
  # Comma-separated list of chat IDs (groups or users) the bot is allowed to join.
  chatAllowlist: ""

mattermost:
  # Enable the Mattermost bot adapter.
  enabled: false
  # Mattermost server URL, e.g. https://mattermost.example.com
  serverUrl: ""
  # Comma-separated list of channel IDs the bot is allowed to post in.
  channelAllowlist: ""

slack:
  # Enable the Slack bot adapter (wave-3 bot-token flow).
  enabled: false
  # Comma-separated list of Slack channel IDs the bot is allowed to post in.
  channelAllowlist: ""
