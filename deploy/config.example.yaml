# Xiaoguai Core — example configuration.
#
# Copy this file to /etc/xiaoguai/config.yaml and edit for your deployment.
# Every setting can also be overridden by an environment variable using the
# XIAOGUAI_ prefix and `__` as a nested-key separator. Example:
#
#     XIAOGUAI_DATABASE__URL=/var/lib/xiaoguai/data.db
#     XIAOGUAI_AUTH__REQUIRED=true
#
# Env overrides win over file values. CLI flags win over env.

server:
  # 0.0.0.0 binds to all interfaces. Restrict to 127.0.0.1 if you front
  # the service with a reverse proxy on the same host.
  host: 0.0.0.0
  port: 7600
  # Optional: directory holding the built web UIs. When set (and present),
  # the server serves chat-ui at / and admin-ui at /admin/ from
  # <static_dir>/chat-ui and <static_dir>/admin-ui. Leave unset for an
  # API-only server. The container image bundles them at /app/static and
  # sets this automatically (XIAOGUAI_SERVER__STATIC_DIR). admin-ui must be
  # built with Vite base "/admin/" (the image build does this).
  # static_dir: /app/static

database:
  # Embedded SQLite store (DEC-033 single-user). A filesystem path or a
  # `sqlite://...` URL. Leave EMPTY (the default) to use
  # `$XDG_DATA_HOME/xiaoguai/data.db` or `~/.xiaoguai/data.db` — the file and
  # its parent dir are created on first boot and migrations apply automatically.
  # No external database server is required.
  url: ""
  max_connections: 16

cache:
  # Optional Valkey / Redis URL for idempotency keys + caches. Leave EMPTY
  # (the default) to use an in-process cache — no Redis/Valkey sidecar needed
  # for a single-user deployment.
  url: ""
  key_prefix: "xiaoguai:"

auth:
  # Single-owner access gate (DEC-033). There is no OIDC/RBAC/multi-tenancy —
  # the API is protected by one username + password checked via HTTP Basic.
  # Leave BOTH empty for an open localhost dev run; set them (ideally via the
  # XIAOGUAI_AUTH__USERNAME / XIAOGUAI_AUTH__PASSWORD env vars, not this file)
  # before exposing the service on a URL.
  username: ""
  password: ""

audit:
  # HMAC-SHA256 signing key for the tamper-evident audit chain. This dev
  # default MUST be rotated before production use — either edit this file
  # or set the env var named by `signing_key_env` and the service will
  # prefer the env value.
  hmac_key: dev-only-change-me-32-bytes-min
  signing_key_env: XIAOGUAI_AUDIT_SIGNING_KEY

scheduler:
  # Off by default. Flip to `true` to enable cron / reactive jobs.
  enabled: false
  tick_interval_secs: 30

  # Per-sink config. Uncomment + fill in the sink(s) you want.
  sinks:
    # feishu:
    #   webhook_url: https://open.feishu.cn/open-apis/bot/v2/hook/...
    #   secret: ""
    # telegram:
    #   bot_token: "123456:ABC..."
    #   chat_id: "-1001234567890"
    # email:
    #   smtp_host: smtp.example.com
    #   smtp_port: 587
    #   from: "xiaoguai@example.com"
    #   to: ["ops@example.com"]
    #   username: xiaoguai
    #   password_env: XIAOGUAI_SMTP_PASSWORD
    # inbox: {}

  file_watch:
    enabled: false
    load_routes_from_db: true
    routes: []
    # routes:
    #   - job_id: "notes-reindex"
    #     path: "/var/notes"

im:
  use_in_process_history: false
  max_messages_per_conversation: 50

eval:
  # Directory of *.eval.yaml suites. Endpoints return 503 when the dir
  # doesn't exist — leave the default to keep eval disabled.
  suites_dir: ./eval-suites
  max_iterations: 0

agent:
  # Sprint-12 (v1.9.0) — HotL (human-on-the-loop) gating knobs.
  # The suspend/resume stack landed across S12-1..S12-10; S12-12 flips
  # the default so fresh deployments suspend on Escalate.
  hotl:
    # When `true` (v1.9.0+ default), an Escalate verdict from
    # HotlEnforcer suspends the agent loop until an operator decides via
    # the chat-ui Approve/Deny banner or POST /v1/hotl/decisions. After
    # the default suspend window (24h) elapses with no decision, the
    # loop resumes with an implicit Deny + `verdict=timeout` audit row.
    #
    # Set to `false` to restore v1.8.x behaviour (Escalate → Allow +
    # tracing::warn; tool call dispatches; no operator gate). Choose
    # this only if your tenant has tested on v1.8.x and is not yet
    # ready to wire the operator review workflow. See
    # docs/user-guide/hotl-escalations.md for the opt-out trade-offs.
    #
    # Override via XIAOGUAI_AGENT__HOTL__SUSPEND_ON_ESCALATE=false.
    suspend_on_escalate: true

    # Sprint-13 S13-0 (v1.10 pre-flight surface) — per-scope expiry
    # overrides. Lookup at suspend time: `expiry.get(scope).unwrap_or
    # (default_expiry)` where `default_expiry` is the in-code 24h
    # constant in run_serve. Strings parse via humantime ("24h", "30m",
    # "72h", "1d12h", ...). Missing scopes fall back to the 24h
    # default. S13-7 will wire this map into SuspendingHotlGate ticket
    # minting; S13-0 only adds the config surface so ops can pre-stage
    # the values. Defaults to an empty map (every scope → 24h) so
    # existing v1.9.0 configs deserialize byte-for-byte unchanged.
    expiry:
      tool: 24h
      mcp: 4h
      skill: 72h

    # Sprint-13 S13-0 (v1.10 pre-flight surface) — when `true`, every
    # HotL-escalated tool call MUST have its `args_redacted` field
    # populated by a policy-driven redactor before the HotlPending
    # ticket is minted. Missing/empty redaction → S13-6 treats as a
    # hard policy violation (escalation rejected).
    #
    # v1.10 default: `false` (pass-through, matches v1.9.0 behaviour).
    # v1.11 will flip this to `true` so production deployments stop
    # leaking raw tool arguments through the HotL banner / audit chain.
    #
    # Override via XIAOGUAI_AGENT__HOTL__REDACTION_POLICY_REQUIRED=true.
    redaction_policy_required: false
