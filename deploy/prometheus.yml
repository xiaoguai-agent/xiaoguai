# Prometheus scrape configuration for Xiaoguai wave-3 observability stack.
#
# Targets:
#   - otel-collector:8889  (OTLP metrics re-exported as Prometheus)
#   - xiaoguai:9090        (xiaoguai-core native /metrics endpoint, if enabled)
#
# In dev (docker-compose.yml) prometheus binds 127.0.0.1:9090 → host.
# In HA  (docker-compose.ha.yml) prometheus binds 0.0.0.0:9090 → host.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: xiaoguai-local

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: /metrics

  # xiaoguai-core /metrics (Prometheus text format).
  # In HA mode two instances are behind nginx; scrape each directly
  # via the internal network using the service names.
  - job_name: xiaoguai-core
    static_configs:
      - targets: ["xiaoguai-core:9090"]
    metrics_path: /metrics

  - job_name: xiaoguai-core-ha
    static_configs:
      - targets:
          - "xiaoguai-core-1:9090"
          - "xiaoguai-core-2:9090"
    metrics_path: /metrics
