# Canonical Xiaoguai dev / smoke stack (DEC-033 single-user, single binary).
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up --build
#
# Brings up a SINGLE service — xiaoguai-core — with an EMBEDDED SQLite store and
# an in-process cache. No Postgres, no Valkey, no Redis. State persists in the
# `xiaoguai_data` named volume (data.db under /data/xiaoguai inside the
# container). `docker compose down -v` is the canonical reset.
#
# Optional observability (otel-collector + prometheus + grafana) lives in
# deploy/docker-compose.observability.yml — layer it on with:
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/docker-compose.observability.yml up --build

services:
  xiaoguai-core:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      XIAOGUAI_SERVER__HOST: 0.0.0.0
      XIAOGUAI_SERVER__PORT: "7600"
      # Serve the bundled web UI (chat-ui at /, admin-ui at /admin/) baked into
      # the image at /app/static. Set to "" for an API-only server.
      XIAOGUAI_SERVER__STATIC_DIR: /app/static
      # Empty DB url -> embedded SQLite at $XDG_DATA_HOME/xiaoguai/data.db.
      XDG_DATA_HOME: /data
      # The cache is process-local (in-process DashMap) — no Redis/Valkey sidecar.
      RUST_LOG: info,sqlx=warn
      # E2E/dev: wire the optional subsystems the e2e suite exercises so they
      # don't return 503. These are NOT production secrets — a real deploy
      # overrides them. Without the audit signing key, /v1/admin/audit*,
      # /v1/audit/exports return 503; without the scheduler enabled,
      # /v1/admin/scheduler/* return 503.
      XIAOGUAI_AUDIT_SIGNING_KEY: e2e-dev-audit-hmac-key-not-for-production
      XIAOGUAI_SCHEDULER__ENABLED: "true"
      # Deterministic agent replies for e2e/smoke — the seeded providers
      # (ollama-local, minimax) need a running Ollama / an API key. NEVER in prod.
      XIAOGUAI_LLM__MOCK: "true"
    volumes:
      - xiaoguai_data:/data
    ports:
      - "7600:7600"

  # Uncomment to add a local Ollama instance to the stack. Pull a model
  # first: `docker compose exec ollama ollama pull qwen2.5-coder`.
  # ollama:
  #   image: ollama/ollama:latest
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   ports:
  #     - "11434:11434"

volumes:
  xiaoguai_data:
  # ollama_data:
