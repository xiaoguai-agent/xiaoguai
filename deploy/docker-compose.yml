# Canonical Xiaoguai dev / smoke stack.
#
# Usage:
#   cd <repo root>
#   docker compose -f deploy/docker-compose.yml up --build
#
# Brings up:
#   - postgres 16     (state for sessions / messages / mcp / providers / audit)
#   - valkey 8        (cache + idempotency keys)
#   - xiaoguai-core   (HTTP API on :7600)
#
# Optional add-ons (not enabled by default):
#   - ollama          uncomment the ollama service to run a local LLM
#   - mcp-fs          a stdio MCP server reading the host's ./scratch dir
#
# The compose file deliberately mounts named volumes for state so `docker
# compose down -v` is the canonical reset.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: xiaoguai
      POSTGRES_PASSWORD: xiaoguai
      POSTGRES_DB: xiaoguai
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiaoguai"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "60", "1"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  xiaoguai-core:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      XIAOGUAI_SERVER__HOST: 0.0.0.0
      XIAOGUAI_SERVER__PORT: "7600"
      XIAOGUAI_DATABASE__URL: postgres://xiaoguai:xiaoguai@postgres:5432/xiaoguai
      XIAOGUAI_CACHE__URL: redis://valkey:6379
      # v0.6 ships MockBackend by default; v0.6.1 will wire LlmRouter.
      RUST_LOG: info,sqlx=warn
    ports:
      - "7600:7600"

  # Uncomment to add a local Ollama instance to the stack. Pull a model
  # first: `docker compose exec ollama ollama pull qwen2.5-coder`.
  # ollama:
  #   image: ollama/ollama:latest
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   ports:
  #     - "11434:11434"

volumes:
  pg_data:
  valkey_data:
  # ollama_data:
