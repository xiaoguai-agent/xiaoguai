# OpenTelemetry Collector configuration for Xiaoguai wave-3 observability stack.
#
# Receivers:
#   - OTLP gRPC on :4317   (xiaoguai-core traces + metrics)
#   - OTLP HTTP on :4318   (browser / SDK fallback)
#
# Exporters:
#   - Prometheus on :8889  (scraped by prometheus service)
#   - Logging             (dev-friendly stdout dump)
#
# Pipeline:
#   traces   → logging
#   metrics  → prometheus + logging

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: xiaoguai
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
