apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: xiaoguai-mtls
  namespace: xiaoguai
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/managed-by: kustomize
spec:
  # No selector: applies to all pods in the xiaoguai namespace
  mtls:
    mode: STRICT
  # Port-level overrides: healthz on 8080 must remain plaintext for kubelet probes.
  # Istio 1.9+ rewrites liveness/readiness probes automatically; if your operator
  # has not enabled rewriteAppHTTPProbers=true, uncomment the portLevelMtls below.
  # portLevelMtls:
  #   8080:
  #     mode: PERMISSIVE   # only for environments without probe rewriting
