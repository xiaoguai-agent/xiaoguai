apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: xiaoguai-outcomes
  namespace: xiaoguai
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: outcomes
    app.kubernetes.io/managed-by: kustomize
spec:
  hosts:
    - xiaoguai
  http:
    - name: outcomes-routes
      match:
        - uri:
            prefix: /v1/outcomes/
      # 30s: timeseries queries (windowed aggregates) are inherently slow
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: 5xx,reset,connect-failure
      route:
        # Canary split: adjust weights here during progressive rollout.
        # Default: 100% stable. During canary: 90 stable / 10 canary.
        - destination:
            host: xiaoguai
            port:
              number: 8080
          weight: 100
        - destination:
            host: xiaoguai-canary
            port:
              number: 8080
          weight: 0
