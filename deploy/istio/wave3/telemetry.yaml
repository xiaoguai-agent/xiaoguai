apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: xiaoguai-telemetry
  namespace: xiaoguai
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/managed-by: kustomize
spec:
  # Applies to all workloads in the xiaoguai namespace.
  # To scope to a specific workload, add:
  #   selector:
  #     matchLabels:
  #       app.kubernetes.io/name: xiaoguai

  # --- Tracing ---
  tracing:
    - providers:
        - name: otel
      # 10% sampling for normal traffic
      randomSamplingPercentage: 10.0
      # Custom tag: include request-id header for correlation with app logs
      customTags:
        request_id:
          header:
            name: x-request-id
            defaultValue: ""
        env:
          literal:
            value: production

  # --- Access Logging ---
  accessLogging:
    - providers:
        - name: otel-access-log
      # Log ALL requests — filter expression below restricts to errors only.
      # This keeps the provider config simple; filtering happens at the provider level.
      # For Envoy filter expression support (Istio ≥ 1.18):
      filter:
        expression: "response.code >= 500 || response.code == 0"
      # Set to false to disable access logging entirely (e.g., high-throughput health checks).
      # disabled: false

  # --- Metrics ---
  metrics:
    - providers:
        - name: prometheus
      overrides:
        # Add dimension for canary tracking
        - match:
            metric: ALL_METRICS
          tagOverrides:
            destination_version:
              value: "node.metadata['LABELS']['app.kubernetes.io/version']"

# OTLP collector service reference.
# Assumes the following provider is registered in the istio ConfigMap (meshConfig.extensionProviders):
#
# extensionProviders:
#   - name: otel
#     opentelemetry:
#       service: opentelemetry-collector.monitoring.svc.cluster.local
#       port: 4317
#   - name: otel-access-log
#     envoyOtelAls:
#       service: opentelemetry-collector.monitoring.svc.cluster.local
#       port: 4317
#
# Apply via: kubectl -n istio-system edit configmap istio
