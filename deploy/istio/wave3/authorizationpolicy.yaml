apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: xiaoguai-allow-ingress
  namespace: xiaoguai
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: xiaoguai
  action: ALLOW
  rules:
    # Rule 1: ingress-gateway in istio-ingress namespace
    - from:
        - source:
            principals:
              - "cluster.local/ns/istio-ingress/sa/istio-ingressgateway"
              - "cluster.local/ns/istio-system/sa/istio-ingressgateway"
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
            paths: ["/v1/*", "/healthz", "/metrics"]
    # Rule 2: internal pods within the same namespace (service-to-service calls)
    - from:
        - source:
            namespaces: ["xiaoguai"]
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
            paths: ["/v1/*", "/healthz", "/metrics"]
    # Rule 3: Prometheus scrape from monitoring namespace
    - from:
        - source:
            namespaces: ["monitoring"]
      to:
        - operation:
            methods: ["GET"]
            paths: ["/metrics"]
---
# Explicit DENY-all default: everything not matched by ALLOW rules above is denied.
# Istio's default is ALLOW-all when no AuthorizationPolicy exists;
# once any ALLOW policy targets a workload, unmatched traffic is implicitly denied.
# This explicit DENY makes the intent visible in `istioctl analyze` output.
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: xiaoguai-deny-all
  namespace: xiaoguai
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: xiaoguai
  action: DENY
  rules:
    - from:
        - source:
            notNamespaces:
              - "xiaoguai"
              - "istio-ingress"
              - "istio-system"
              - "monitoring"
