# Wave-3 feature flags for the staging overlay.
# Staging: HotL + outcomes + observability enabled.
# Cloud LLM v2 keys should be loaded via xiaoguai-llm-cloud Secret if testing LLM routing.
# IM channels remain off until integration testing is planned.
apiVersion: v1
kind: ConfigMap
metadata:
  name: xiaoguai-config
data:
  # HotL
  HOTL_ENABLED: "true"
  HOTL_POLICY_STORE_BACKEND: "postgres"

  # Outcomes (postgres backend in staging; mirrors prod data model)
  OUTCOMES_BACKEND: "postgres"
  OUTCOMES_RETENTION_DAYS: "14"
  OUTCOMES_TIMESERIES_BUCKET_SECS: "3600"

  # Skill Packs (auto-install disabled; operator approves pack list)
  SKILLS_AUTO_INSTALL: "false"

  # Rate limiting (redis backend to exercise shared-state path)
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_BACKEND: "redis"

  # Observability (10% sample rate — default, same as prod)
  OTEL_TRACES_SAMPLE_RATE: "0.1"
  PROMETHEUS_LISTEN_ADDR: "0.0.0.0:9090"

  # IM channels — off in staging by default
  DISCORD_ENABLED: "false"
  TELEGRAM_ENABLED: "false"
  MATTERMOST_ENABLED: "false"
  SLACK_ENABLED: "false"
