apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xiaoguai-staging

resources:
  - ../../base
  - hpa.yaml
  - networkpolicy.yaml

images:
  - name: ghcr.io/xiaoguai-agent/xiaoguai
    newTag: staging

patches:
  # 2 replicas; HPA takes over from min=2
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: xiaoguai
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: xiaoguai-core
                resources:
                  requests:
                    cpu: 100m
                    memory: 192Mi
                  limits:
                    cpu: "2"
                    memory: 1Gi

  # Staging ingress
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: xiaoguai
      spec:
        rules:
          - host: xiaoguai.staging.example.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: xiaoguai
                      port:
                        number: 8080
