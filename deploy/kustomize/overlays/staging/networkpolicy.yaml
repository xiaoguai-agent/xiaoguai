##############################################################################
# Staging overlay — CIDR-scoped external egress for xiaoguai-core
#
# The base networkpolicy-core.yaml already handles:
#   - Ingress from ingress-nginx, intra-core peers, prometheus
#   - Egress to postgres (pod-selector), redis (pod-selector),
#     otel-collector (pod-selector), DNS
#   - Egress to 443/TCP (open — intentional in base, tightened here)
#
# This policy adds an ADDITIONAL named NetworkPolicy that restricts the
# external HTTPS egress to known provider CIDR blocks, replacing the
# broad "any 443" rule in the base with explicit ipBlock entries.
#
# Staging is tighter than dev but does not require a change-management
# review gate for new provider CIDRs (unlike prod).
#
# CIDRs (review quarterly; last reviewed 2026-05):
#   OpenAI / OpenAI-compatible: 104.18.0.0/16, 104.19.0.0/16 (Cloudflare)
#   Azure OpenAI:               20.0.0.0/8  (Microsoft — broad; narrow to
#                               region if Azure regions are fixed)
#   AWS Bedrock us-east-1:      52.94.0.0/22, 52.119.224.0/21
#   Slack webhooks:             54.172.0.0/22, 52.54.0.0/22
#   Discord webhooks:           162.159.128.0/17 (Cloudflare anycast)
#   Telegram Bot API:           149.154.160.0/20, 91.108.4.0/22
#   Snyk API:                   99.83.191.0/24, 162.247.243.0/24
#
# If Cilium is the CNI, replace ipBlock rules with CiliumNetworkPolicy
# using FQDN-based egress (see networkpolicy-README.md §CNI compatibility).
##############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: xiaoguai-core-external-egress
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/environment: staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: xiaoguai
      app.kubernetes.io/component: core
  policyTypes:
    - Egress

  egress:
    # ── OpenAI / compatible (Cloudflare-fronted) ───────────────────────────
    - to:
        - ipBlock:
            cidr: 104.18.0.0/16
        - ipBlock:
            cidr: 104.19.0.0/16
      ports:
        - protocol: TCP
          port: 443

    # ── Azure OpenAI ───────────────────────────────────────────────────────
    - to:
        - ipBlock:
            cidr: 20.0.0.0/8
      ports:
        - protocol: TCP
          port: 443

    # ── AWS Bedrock (us-east-1) ────────────────────────────────────────────
    - to:
        - ipBlock:
            cidr: 52.94.0.0/22
        - ipBlock:
            cidr: 52.119.224.0/21
      ports:
        - protocol: TCP
          port: 443

    # ── Slack webhooks ─────────────────────────────────────────────────────
    - to:
        - ipBlock:
            cidr: 54.172.0.0/22
        - ipBlock:
            cidr: 52.54.0.0/22
      ports:
        - protocol: TCP
          port: 443

    # ── Discord webhooks ───────────────────────────────────────────────────
    - to:
        - ipBlock:
            cidr: 162.159.128.0/17
      ports:
        - protocol: TCP
          port: 443

    # ── Telegram Bot API ───────────────────────────────────────────────────
    - to:
        - ipBlock:
            cidr: 149.154.160.0/20
        - ipBlock:
            cidr: 91.108.4.0/22
      ports:
        - protocol: TCP
          port: 443

    # ── Snyk API ───────────────────────────────────────────────────────────
    - to:
        - ipBlock:
            cidr: 99.83.191.0/24
        - ipBlock:
            cidr: 162.247.243.0/24
      ports:
        - protocol: TCP
          port: 443

    # ── JWKS issuer (external IdP: Auth0, Okta, etc.) ─────────────────────
    # If issuer is in-cluster (Keycloak), replace with pod-selector rule.
    - ports:
        - protocol: TCP
          port: 443
