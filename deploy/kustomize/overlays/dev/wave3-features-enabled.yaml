# Wave-3 feature flags for the dev overlay.
# Dev: all subsystems enabled to allow end-to-end testing.
# Credentials are still expected via the xiaoguai-llm-cloud and xiaoguai-im Secrets.
apiVersion: v1
kind: ConfigMap
metadata:
  name: xiaoguai-config
data:
  # HotL
  HOTL_ENABLED: "true"
  HOTL_POLICY_STORE_BACKEND: "in-mem"

  # Outcomes (in-mem backend; no external store required in dev)
  OUTCOMES_BACKEND: "in-mem"
  OUTCOMES_RETENTION_DAYS: "7"
  OUTCOMES_TIMESERIES_BUCKET_SECS: "3600"

  # Skill Packs (auto-install safe in dev)
  SKILLS_AUTO_INSTALL: "true"

  # Rate limiting (in-mem, low threshold to surface issues early)
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_BACKEND: "in-mem"

  # Cloud LLM v2
  BEDROCK_REGION: "us-east-1"
  AZURE_OPENAI_API_VERSION: "2024-02-01"

  # Observability (100% sample rate in dev — full trace coverage)
  OTEL_TRACES_SAMPLE_RATE: "1.0"
  PROMETHEUS_LISTEN_ADDR: "0.0.0.0:9090"

  # IM channels
  DISCORD_ENABLED: "true"
  TELEGRAM_ENABLED: "true"
  MATTERMOST_ENABLED: "true"
  SLACK_ENABLED: "true"
