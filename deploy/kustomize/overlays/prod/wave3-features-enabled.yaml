# Wave-3 feature flags for the prod overlay.
# Prod: observability + Cloud LLM v2 only.
# HotL, outcomes, IM, rate-limit, skill auto-install all require operator review
# and must be explicitly enabled here once approved.
apiVersion: v1
kind: ConfigMap
metadata:
  name: xiaoguai-config
data:
  # HotL — OFF until operator review complete
  HOTL_ENABLED: "false"

  # Outcomes — OFF until operator review complete
  OUTCOMES_BACKEND: "in-mem"

  # Skill Packs — never auto-install in prod
  SKILLS_AUTO_INSTALL: "false"

  # Rate limiting — OFF until load-test results reviewed
  RATE_LIMIT_ENABLED: "false"

  # Cloud LLM v2 (region + version only; keys in xiaoguai-llm-cloud Secret)
  BEDROCK_REGION: "us-east-1"
  AZURE_OPENAI_API_VERSION: "2024-02-01"

  # Observability — ON (low sample rate to limit trace volume)
  OTEL_TRACES_SAMPLE_RATE: "0.1"
  PROMETHEUS_LISTEN_ADDR: "0.0.0.0:9090"

  # IM channels — OFF until operator review complete
  DISCORD_ENABLED: "false"
  TELEGRAM_ENABLED: "false"
  MATTERMOST_ENABLED: "false"
  SLACK_ENABLED: "false"
