apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: xiaoguai-high
  labels:
    app.kubernetes.io/name: xiaoguai
value: 1000000
globalDefault: false
description: >
  High-priority class for Xiaoguai production pods.
  Ensures core pods are not evicted before less-critical workloads
  under node memory pressure.
