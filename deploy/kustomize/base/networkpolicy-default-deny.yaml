##############################################################################
# Default-Deny NetworkPolicy
#
# Applies to ALL pods in the xiaoguai namespace (empty podSelector).
# Blocks all ingress and egress unless a more specific NetworkPolicy
# explicitly allows it.
#
# CNI requirement: any standard CNI that implements NetworkPolicy
# (Cilium, Calico, Weave, Antrea, Azure CNI, Amazon VPC CNI ≥ v1.11).
##############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/managed-by: kustomize
spec:
  # Empty selector = applies to every pod in this namespace.
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  # No ingress or egress rules = deny all.
