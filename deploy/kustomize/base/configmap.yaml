apiVersion: v1
kind: ConfigMap
metadata:
  name: xiaoguai-config
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: core
data:
  # Non-sensitive runtime configuration.
  # Sensitive values (DB URL, secrets) live in Kubernetes Secrets — see secret.yaml.
  XIAOGUAI_SERVER__HOST: "0.0.0.0"
  XIAOGUAI_SERVER__PORT: "8080"

  # ---------------------------------------------------------------------------
  # Wave-3: HotL (Hot-Loop) subsystem
  # Override in overlays to enable. HOTL_POLICY_STORE_BACKEND options:
  #   in-mem | postgres | redis
  # ---------------------------------------------------------------------------
  HOTL_ENABLED: "false"
  HOTL_POLICY_STORE_BACKEND: "in-mem"

  # ---------------------------------------------------------------------------
  # Wave-3: Outcomes subsystem
  # OUTCOMES_BACKEND options: in-mem | postgres | clickhouse
  # OUTCOMES_TIMESERIES_BUCKET_SECS: bucket width for time-series rollups (secs)
  # OUTCOMES_RETENTION_DAYS: rows older than this are pruned
  # ---------------------------------------------------------------------------
  OUTCOMES_BACKEND: "in-mem"
  OUTCOMES_RETENTION_DAYS: "30"
  OUTCOMES_TIMESERIES_BUCKET_SECS: "86400"

  # ---------------------------------------------------------------------------
  # Wave-3: Skill Packs
  # SKILLS_PACKS_CONFIG_PATH: directory containing pack manifests (ConfigMap-mounted)
  # SKILLS_AUTO_INSTALL: whether to install packs on startup (false = operator-review first)
  # ---------------------------------------------------------------------------
  SKILLS_PACKS_CONFIG_PATH: "/etc/xiaoguai/packs"
  SKILLS_AUTO_INSTALL: "false"

  # ---------------------------------------------------------------------------
  # Wave-3: Rate limiting
  # RATE_LIMIT_BACKEND options: in-mem | redis
  # ---------------------------------------------------------------------------
  RATE_LIMIT_ENABLED: "false"
  RATE_LIMIT_BACKEND: "in-mem"

  # ---------------------------------------------------------------------------
  # Wave-3: Cloud LLM v2 (non-secret config; API keys live in xiaoguai-llm-cloud Secret)
  # ---------------------------------------------------------------------------
  BEDROCK_REGION: "us-east-1"
  AZURE_OPENAI_API_VERSION: "2024-02-01"

  # ---------------------------------------------------------------------------
  # Wave-3: Observability
  # OTEL_TRACES_SAMPLE_RATE: 0.0 (off) – 1.0 (100%)
  # PROMETHEUS_LISTEN_ADDR: host:port for the /metrics scrape endpoint
  # ---------------------------------------------------------------------------
  OTEL_TRACES_SAMPLE_RATE: "0.1"
  PROMETHEUS_LISTEN_ADDR: "0.0.0.0:9090"

  # ---------------------------------------------------------------------------
  # Wave-3: IM channels (Instant Messaging integrations)
  # All disabled by default; credentials live in xiaoguai-im Secret
  # ---------------------------------------------------------------------------
  DISCORD_ENABLED: "false"
  TELEGRAM_ENABLED: "false"
  MATTERMOST_ENABLED: "false"
  SLACK_ENABLED: "false"
