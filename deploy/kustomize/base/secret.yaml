# Sealed-Secrets compatible placeholder.
#
# This file intentionally contains ONLY the resource skeleton — no real
# secret values.  In practice you have two options:
#
# Option A — Sealed Secrets (recommended for GitOps):
#   1. Install the Sealed Secrets controller once per cluster:
#        kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/latest/download/controller.yaml
#   2. Seal each secret with kubeseal:
#        kubectl create secret generic xiaoguai-database \
#            --from-literal=url='postgres://user:pass@host:5432/xiaoguai' \
#            --dry-run=client -o yaml \
#          | kubeseal --controller-name=sealed-secrets --format=yaml \
#          > overlays/<env>/sealedsecret-database.yaml
#   3. Commit the SealedSecret YAML (safe to store in Git).
#   4. Remove or .gitignore this skeleton file from overlays.
#
# Option B — External Secrets Operator / Vault / AWS SSM:
#   Replace this file with an ExternalSecret resource pointing to your
#   secret backend.  The Secret names below must still match the
#   secretKeyRef entries in deployment.yaml.
#
# Secret name matrix (all must exist before `kubectl apply`):
#   xiaoguai-database  → key: url        (PostgreSQL connection string)
#   xiaoguai-cache     → key: url        (Valkey / Redis connection string)
#   xiaoguai-auth      → keys: issuer, audience, jwks_url  (OIDC config)
#   xiaoguai-audit     → key: hmac_key   (audit-log HMAC signing key)
#
# Example skeleton (replace CHANGEME values before applying):
---
apiVersion: v1
kind: Secret
metadata:
  name: xiaoguai-database
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: core
type: Opaque
stringData:
  url: "postgres://xiaoguai:CHANGEME@postgres:5432/xiaoguai?sslmode=require"
---
apiVersion: v1
kind: Secret
metadata:
  name: xiaoguai-cache
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: core
type: Opaque
stringData:
  url: "redis://:CHANGEME@valkey:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: xiaoguai-auth
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: core
type: Opaque
stringData:
  issuer: "https://auth.example.com"
  audience: "xiaoguai"
  jwks_url: "https://auth.example.com/.well-known/jwks.json"
---
apiVersion: v1
kind: Secret
metadata:
  name: xiaoguai-audit
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: core
type: Opaque
stringData:
  hmac_key: "CHANGEME-32-byte-hex-key"
---
# ---------------------------------------------------------------------------
# Wave-3: Cloud LLM v2 credentials
#
# Keys and how to create them:
#
#   bedrock-access-key-id     — AWS_ACCESS_KEY_ID for Bedrock IAM user
#   bedrock-secret-access-key — AWS_SECRET_ACCESS_KEY for Bedrock IAM user
#   azure-openai-api-key      — Azure OpenAI resource key (portal → Keys & Endpoint)
#   azure-openai-endpoint     — Full URL, e.g. https://<resource>.openai.azure.com/
#   mistral-api-key           — https://console.mistral.ai/ → API keys
#   groq-api-key              — https://console.groq.com/ → API keys
#
# Recommended creation (never commit real values):
#   kubectl create secret generic xiaoguai-llm-cloud \
#       --from-literal=bedrock-access-key-id=CHANGEME \
#       --from-literal=bedrock-secret-access-key=CHANGEME \
#       --from-literal=azure-openai-api-key=CHANGEME \
#       --from-literal=azure-openai-endpoint=CHANGEME \
#       --from-literal=mistral-api-key=CHANGEME \
#       --from-literal=groq-api-key=CHANGEME \
#       -n <namespace>
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: xiaoguai-llm-cloud
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: cloud-llm
type: Opaque
stringData:
  bedrock-access-key-id: "CHANGEME"
  bedrock-secret-access-key: "CHANGEME"
  azure-openai-api-key: "CHANGEME"
  azure-openai-endpoint: "CHANGEME"
  mistral-api-key: "CHANGEME"
  groq-api-key: "CHANGEME"
---
# ---------------------------------------------------------------------------
# Wave-3: IM channel credentials
#
# Keys and how to create them:
#
#   discord-bot-token     — Discord Developer Portal → Bot → Token
#   telegram-bot-token    — BotFather → /newbot → token
#   mattermost-bot-token  — Mattermost System Console → Integrations → Bot Accounts
#   slack-signing-secret  — Slack App settings → Basic Information → Signing Secret
#   slack-bot-token       — Slack App settings → OAuth & Permissions → Bot User OAuth Token
#
# Recommended creation (never commit real values):
#   kubectl create secret generic xiaoguai-im \
#       --from-literal=discord-bot-token=CHANGEME \
#       --from-literal=telegram-bot-token=CHANGEME \
#       --from-literal=mattermost-bot-token=CHANGEME \
#       --from-literal=slack-signing-secret=CHANGEME \
#       --from-literal=slack-bot-token=CHANGEME \
#       -n <namespace>
#
# Alternatively use Sealed Secrets (kubeseal) or External Secrets Operator —
# see the Option A / Option B instructions at the top of this file.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: xiaoguai-im
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: im
type: Opaque
stringData:
  discord-bot-token: "CHANGEME"
  telegram-bot-token: "CHANGEME"
  mattermost-bot-token: "CHANGEME"
  slack-signing-secret: "CHANGEME"
  slack-bot-token: "CHANGEME"
