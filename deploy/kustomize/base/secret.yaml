# Sealed-Secrets compatible placeholder.
#
# This file intentionally contains ONLY the resource skeleton — no real
# secret values.  In practice you have two options:
#
# Option A — Sealed Secrets (recommended for GitOps):
#   1. Install the Sealed Secrets controller once per cluster:
#        kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/latest/download/controller.yaml
#   2. Seal each secret with kubeseal:
#        kubectl create secret generic xiaoguai-database \
#            --from-literal=url='postgres://user:pass@host:5432/xiaoguai' \
#            --dry-run=client -o yaml \
#          | kubeseal --controller-name=sealed-secrets --format=yaml \
#          > overlays/<env>/sealedsecret-database.yaml
#   3. Commit the SealedSecret YAML (safe to store in Git).
#   4. Remove or .gitignore this skeleton file from overlays.
#
# Option B — External Secrets Operator / Vault / AWS SSM:
#   Replace this file with an ExternalSecret resource pointing to your
#   secret backend.  The Secret names below must still match the
#   secretKeyRef entries in deployment.yaml.
#
# Secret name matrix (all must exist before `kubectl apply`):
#   xiaoguai-database  → key: url        (PostgreSQL connection string)
#   xiaoguai-cache     → key: url        (Valkey / Redis connection string)
#   xiaoguai-auth      → keys: issuer, audience, jwks_url  (OIDC config)
#   xiaoguai-audit     → key: hmac_key   (audit-log HMAC signing key)
#
# Example skeleton (replace CHANGEME values before applying):
---
apiVersion: v1
kind: Secret
metadata:
  name: xiaoguai-database
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: core
type: Opaque
stringData:
  url: "postgres://xiaoguai:CHANGEME@postgres:5432/xiaoguai?sslmode=require"
---
apiVersion: v1
kind: Secret
metadata:
  name: xiaoguai-cache
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: core
type: Opaque
stringData:
  url: "redis://:CHANGEME@valkey:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: xiaoguai-auth
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: core
type: Opaque
stringData:
  issuer: "https://auth.example.com"
  audience: "xiaoguai"
  jwks_url: "https://auth.example.com/.well-known/jwks.json"
---
apiVersion: v1
kind: Secret
metadata:
  name: xiaoguai-audit
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: core
type: Opaque
stringData:
  hmac_key: "CHANGEME-32-byte-hex-key"
