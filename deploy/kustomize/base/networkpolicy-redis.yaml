##############################################################################
# Redis / Valkey NetworkPolicy
#
# Ingress: only xiaoguai-core pods may reach port 6379.
# Egress:  DNS only (redis needs no outbound connections).
##############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Only xiaoguai-core may connect to Redis.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: xiaoguai
              app.kubernetes.io/component: core
      ports:
        - protocol: TCP
          port: 6379

  egress:
    # DNS only — redis initiates no outbound connections.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
