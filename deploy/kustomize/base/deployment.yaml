apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaoguai
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: xiaoguai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: xiaoguai
        app.kubernetes.io/component: core
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: xiaoguai-core
          image: ghcr.io/xiaoguai-agent/xiaoguai:stable
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: XIAOGUAI_SERVER__HOST
              value: "0.0.0.0"
            - name: XIAOGUAI_SERVER__PORT
              value: "8080"
            - name: RUST_LOG
              value: "info,sqlx=warn"
            - name: XIAOGUAI_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: xiaoguai-database
                  key: url
            - name: XIAOGUAI_CACHE__URL
              valueFrom:
                secretKeyRef:
                  name: xiaoguai-cache
                  key: url
            - name: XIAOGUAI_AUTH__ISSUER
              valueFrom:
                secretKeyRef:
                  name: xiaoguai-auth
                  key: issuer
            - name: XIAOGUAI_AUTH__AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: xiaoguai-auth
                  key: audience
            - name: XIAOGUAI_AUTH__JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: xiaoguai-auth
                  key: jwks_url
            - name: XIAOGUAI_AUDIT__HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: xiaoguai-audit
                  key: hmac_key
          envFrom:
            - configMapRef:
                name: xiaoguai-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
