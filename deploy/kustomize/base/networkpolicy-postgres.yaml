##############################################################################
# PostgreSQL NetworkPolicy
#
# Ingress: only xiaoguai-core pods may reach port 5432.
# Egress:
#   - DNS (always)
#   - Backup-store endpoint (TCP 443) — e.g. S3-compatible object store
#     or PgBackRest repository server.  In-cluster backup agents are allowed
#     via the separate backup-agent podSelector rule below.
#
# If postgres runs outside the cluster (RDS, Cloud SQL, AlloyDB), remove
# this NetworkPolicy entirely and control access via security groups /
# Cloud Firewall rules instead.
##############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: xiaoguai
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Only xiaoguai-core may connect to Postgres.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: xiaoguai
              app.kubernetes.io/component: core
      ports:
        - protocol: TCP
          port: 5432

    # Backup agent (e.g. pgBackRest sidecar or Velero hook) — in-cluster.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backup-agent
      ports:
        - protocol: TCP
          port: 5432

  egress:
    # DNS.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Backup-store endpoint (S3-compatible or remote PgBackRest repo).
    # Tighten to specific CIDR in prod overlay if backup store IP is static.
    - ports:
        - protocol: TCP
          port: 443
