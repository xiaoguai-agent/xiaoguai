# nginx reverse proxy in front of the 2× xiaoguai-core instances.
#
# - Listens on :7600 (HA stack's canonical public port; baseline
#   single-node compose still exposes :8080 directly).
# - Load-balances with `least_conn` so streaming SSE sessions don't
#   pile up on a single instance.
# - `max_fails=2 fail_timeout=30s` flips an unhealthy core out of
#   rotation for 30s — this is what gives us "xiaoguai-core
#   instance loss → nginx reroutes" without external orchestration.
# - SSE streaming requires HTTP/1.1 + chunked + no buffering.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # SSE-friendly defaults.
  proxy_http_version 1.1;
  proxy_set_header   Connection        "";
  proxy_buffering    off;
  proxy_read_timeout 1h;

  # Real-IP + standard forwarded headers.
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  upstream xiaoguai_core {
    least_conn;
    server xiaoguai-core-1:8080 max_fails=2 fail_timeout=30s;
    server xiaoguai-core-2:8080 max_fails=2 fail_timeout=30s;
  }

  server {
    listen 7600;
    server_name _;

    # Health endpoint that does NOT proxy — lets the nginx
    # container itself report healthy even when both backends are
    # down (useful for distinguishing "lb broken" from "backends
    # broken" during an incident).
    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    location / {
      proxy_pass http://xiaoguai_core;
      # Retry the next upstream on idempotent failures only — POSTs
      # that already hit the wire MUST NOT be silently re-tried.
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 2;
    }
  }
}
