<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xiaoguai Floater</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- The whole window is the chat card. decorations:false means we draw our
         own chrome; the top bar doubles as the drag region. -->
    <main id="card">
      <header id="titlebar" data-tauri-drag-region>
        <span id="title" data-tauri-drag-region>小怪 · Floater</span>
        <span id="status" aria-live="polite"></span>
      </header>

      <section id="messages" aria-live="polite"></section>

      <footer id="composer">
        <textarea
          id="input"
          rows="1"
          placeholder="问点什么…  (Enter 发送 · Esc 收起)"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
      </footer>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
