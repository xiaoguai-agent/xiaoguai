[package]
name = "xiaoguai-tasks"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Durable Kanban task board (ADR-0019): persistence layer (boards, tasks, column transitions, outcome attribution) plus an auto-dispatcher worker pool (READY→RUNNING→DONE/BLOCKED with claim/execute/retry/timeout)."

[dependencies]
xiaoguai-audit = { path = "../xiaoguai-audit" }
xiaoguai-storage = { path = "../xiaoguai-storage" }
async-trait = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true, features = ["time", "sync", "macros", "rt-multi-thread", "signal"] }
tokio-util = { workspace = true, features = ["time"] }
thiserror = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
tracing = { workspace = true }
once_cell = { workspace = true }
prometheus = { workspace = true }

[dev-dependencies]
serde_yaml = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time", "sync"] }
tracing-subscriber = { workspace = true }

[lints]
workspace = true
