[package]
name = "xiaoguai-tasks"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Durable Kanban-style task board for multi-agent work queues — boards, cards, column transitions, and outcome attribution per ADR-0019."

[dependencies]
xiaoguai-audit = { path = "../xiaoguai-audit" }
async-trait      = { workspace = true }
serde            = { workspace = true }
serde_json       = { workspace = true }
sqlx             = { workspace = true }
tokio            = { workspace = true, features = ["time", "sync", "macros", "rt"] }
thiserror        = { workspace = true }
chrono           = { workspace = true }
uuid             = { workspace = true }

[dev-dependencies]
tokio              = { workspace = true, features = ["macros", "rt-multi-thread", "time", "sync"] }
tracing-subscriber = { workspace = true }

[lints]
workspace = true
