[package]
name = "xiaoguai-rag"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "RAG layer — RagClient trait + R2R HTTP adapter + in-memory dev impl + MCP-tool adapter."

[dependencies]
xiaoguai-types = { path = "../xiaoguai-types" }
xiaoguai-mcp = { path = "../xiaoguai-mcp" }
async-trait = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
url = { workspace = true }
parking_lot = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
# v0.12.2: `reindex_path` reads the watched file from disk before
# handing it to `ingest` — keeps the in-memory backend usable by the
# file-watch ↔ RAG bridge without dragging in extra deps.
tokio = { workspace = true, features = ["fs"] }
# v1.2.16: Qdrant vector store backend (gRPC/tonic; always included in
# xiaoguai-rag so callers can swap backends without recompilation).
qdrant-client = { workspace = true }
# v1.2.16: Tantivy local BM25 lexical backend.
tantivy = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "fs"] }
tempfile = { workspace = true }

[lints]
workspace = true
