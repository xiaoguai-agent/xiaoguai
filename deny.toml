[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# v1.1.8: keep this list in lock-step with .cargo/audit.toml. Every entry
# must justify itself in writing — review quarterly + drop the ignore as
# soon as upstream ships a fix.
ignore = [
    # dev-dep only (testcontainers → bollard → rustls-pemfile).
    # Production code never touches Docker. Track upstream replacement.
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; dev-only via testcontainers" },
    # dev-dep only (testcontainers → bollard → tokio-tar).
    # PAX header smuggling does not affect our use of testcontainers (we control the images).
    { id = "RUSTSEC-2025-0111", reason = "tokio-tar PAX smuggling; dev-only via testcontainers, no untrusted tar input" },
    # transitive via sqlx-mysql; we only use Postgres. No upstream fix.
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin sidechannel; pulled by unused sqlx-mysql backend, no fix available" },
    # transitive via notify → notify-types. Low-risk web-time shim.
    { id = "RUSTSEC-2024-0384", reason = "instant unmaintained; transitive via notify, no fix available" },
    # transitive via opentelemetry_sdk 0.27 (async-std discontinued). Not used
    # directly; the pending OTel 0.32 upgrade is expected to drop it.
    { id = "RUSTSEC-2025-0052", reason = "async-std discontinued; transitive via opentelemetry_sdk 0.27, no direct use" },
    # transitive retry helper (feature-gated via aws/otlp). Unmaintained, not vulnerable.
    { id = "RUSTSEC-2025-0012", reason = "backoff unmaintained; transitive retry dep, no direct use" },
    # compile-time proc-macro via age → i18n-embed-fl. Not in the runtime binary.
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained; build-time only via age, not shipped" },
    # transitive via pdf-extract → lopdf (RAG PDF text extraction of owner-provided
    # files). Unmaintained flag only — no vulnerability; RustSec offers no safe
    # upgrade. Revisit when lopdf moves off ttf-parser.
    { id = "RUSTSEC-2026-0192", reason = "ttf-parser unmaintained; transitive via pdf-extract/lopdf, no fix available" },
]

# v1.1.8: gating allow-list. Anything not in this list is denied,
# including copyleft licenses (GPL-*, AGPL-*, LGPL-*). The project
# itself ships under Apache-2.0; pulling in GPL-3.0 would force the
# whole binary to GPL.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "CC0-1.0",
    # Boost Software License 1.0 — OSI-approved, permissive (MIT-like, no
    # copyleft). Pulled in by redis 1.x.
    "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
