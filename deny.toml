[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # dev-dep only (testcontainers → bollard → rustls-pemfile).
    # Production code never touches Docker. Track upstream replacement.
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; dev-only via testcontainers" },
    # dev-dep only (testcontainers → bollard → tokio-tar).
    # PAX header smuggling does not affect our use of testcontainers (we control the images).
    { id = "RUSTSEC-2025-0111", reason = "tokio-tar PAX smuggling; dev-only via testcontainers, no untrusted tar input" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "BUSL-1.1",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
