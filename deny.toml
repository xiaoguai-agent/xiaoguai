[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# v1.1.8: keep this list in lock-step with .cargo/audit.toml. Every entry
# must justify itself in writing — review quarterly + drop the ignore as
# soon as upstream ships a fix.
ignore = [
    # transitive via tonic → qdrant-client (RAG vector store), so it IS in the
    # shipped binary. Unmaintained flag only — no known vulnerability. The old
    # "dev-only via testcontainers" justification lapsed when testcontainers
    # left the tree; revisit when tonic moves to rustls-pki-types.
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; transitive via tonic/qdrant-client, no fix available" },
    # compile-time proc-macro via age 0.12 → i18n-embed-fl. Successor to the
    # equally-unmaintained proc-macro-error (RUSTSEC-2024-0370, which left the
    # tree with age 0.10). Never linked into the shipped runtime binary and the
    # advisory offers no safe upgrade. Revisit when i18n-embed-fl migrates.
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 unmaintained; build-time only via age/i18n-embed-fl, not shipped" },
    # transitive via pdf-extract → lopdf (RAG PDF text extraction of owner-provided
    # files). Unmaintained flag only — no vulnerability; RustSec offers no safe
    # upgrade. Revisit when lopdf moves off ttf-parser.
    { id = "RUSTSEC-2026-0192", reason = "ttf-parser unmaintained; transitive via pdf-extract/lopdf, no fix available" },
]

# v1.1.8: gating allow-list. Anything not in this list is denied,
# including copyleft licenses (GPL-*, AGPL-*, LGPL-*). The project
# itself ships under Apache-2.0; pulling in GPL-3.0 would force the
# whole binary to GPL.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "CC0-1.0",
    # Boost Software License 1.0 — OSI-approved, permissive (MIT-like, no
    # copyleft). Pulled in by redis 1.x.
    "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
