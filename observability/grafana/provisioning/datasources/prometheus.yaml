apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    # Override via PROMETHEUS_URL env var in docker-compose or systemd unit
    url: ${PROMETHEUS_URL:http://localhost:9090}
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    editable: false

  - name: Loki
    type: loki
    uid: loki
    # Override via LOKI_URL env var
    url: ${LOKI_URL:http://localhost:3100}
    access: proxy
    isDefault: false
    jsonData:
      maxLines: 1000
    editable: false
