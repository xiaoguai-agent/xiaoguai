      # ----------------------------------------------------------
      # outcomes_timeseries — p95 SLO: 500 ms (99%)
      # ----------------------------------------------------------
      - record: sli:outcomes_timeseries:fast_ratio:rate5m
        expr: |
          sum(rate(xiaoguai_outcomes_timeseries_duration_seconds_bucket{le="0.5"}[5m]))
          /
          sum(rate(xiaoguai_outcomes_timeseries_duration_seconds_count[5m]))

      - record: sli:outcomes_timeseries:fast_ratio:rate30m
        expr: |
