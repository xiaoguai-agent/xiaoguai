# ============================================================
# GROUP 2 — Burn-rate alert rules
# ============================================================
  - name: wave3-slo-burn-rate-alerts
    rules:

      # --------------------------------------------------------
      # SLO: hotl_check_latency — 99.9% requests p95 < 25ms
      # error_budget_ratio = 0.001
      # --------------------------------------------------------

      # Pair 1 — critical: 14.4× / 1h + 5m
      - alert: HotlCheckLatencyBurnRateCritical1h5m
        expr: |
          (1 - sli:hotl_check_latency:fast_ratio:rate1h) > (14.4 * 0.001)
          and
          (1 - sli:hotl_check_latency:fast_ratio:rate5m) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          slo: hotl_check_latency
          team: platform
          subsystem: hotl
          runbook_url: "https://github.com/zw008/xiaoguai/blob/main/docs/runbooks/hotl-escalation-stuck.md"
        annotations:
          summary: "HotL check latency SLO burning budget at 14.4x (critical, 1h+5m windows)"
          description: >
            The hotl_check_latency SLO (99.9% requests completing in <25ms) is burning
            its 28-day error budget at >=14.4x the steady-state rate.
            At this rate the full 28-day budget is exhausted in ~47 hours.
            Both the 1h and 5m windows are breaching threshold simultaneously.
            Error ratio (1h window): {{ printf "%.4f" (index . "value") }}.
            See perf budget: docs/architecture/perf-budget-wave3.md §2.
          runbook_url: "https://github.com/zw008/xiaoguai/blob/main/docs/runbooks/hotl-escalation-stuck.md"
          dashboard_url: "https://grafana.internal/d/xiaoguai-slo-burnrate?orgId=1&var-slo=hotl_check_latency"
          perf_budget_doc: "https://github.com/zw008/xiaoguai/blob/docs/perf-budget-wave3/docs/architecture/perf-budget-wave3.md"
          error_budget_consumed_pct: >-
            {{ printf "%.1f" (mul (sub 1.0 (index . "sli:hotl_check_latency:fast_ratio:rate1h")) (div 1.0 0.001) 100.0) }}%

      # Pair 2 — critical: 6× / 6h + 30m
      - alert: HotlCheckLatencyBurnRateCritical6h30m
        expr: |
          (1 - sli:hotl_check_latency:fast_ratio:rate6h) > (6 * 0.001)
          and
          (1 - sli:hotl_check_latency:fast_ratio:rate30m) > (6 * 0.001)
        for: 5m
        labels:
          severity: critical
          slo: hotl_check_latency
          team: platform
          subsystem: hotl
          runbook_url: "https://github.com/zw008/xiaoguai/blob/main/docs/runbooks/hotl-escalation-stuck.md"
        annotations:
          summary: "HotL check latency SLO burning budget at 6x (critical, 6h+30m windows)"
          description: >
            The hotl_check_latency SLO is burning its error budget at >=6x the steady-state rate.
            At this rate the full 28-day budget is exhausted in ~4.7 days.
            Error ratio (6h window): {{ printf "%.4f" (index . "value") }}.
            See perf budget: docs/architecture/perf-budget-wave3.md §2.
          dashboard_url: "https://grafana.internal/d/xiaoguai-slo-burnrate?orgId=1&var-slo=hotl_check_latency"
          perf_budget_doc: "https://github.com/zw008/xiaoguai/blob/docs/perf-budget-wave3/docs/architecture/perf-budget-wave3.md"

      # Pair 3 — warning: 3× / 1d + 2h
      - alert: HotlCheckLatencyBurnRateWarning1d2h
        expr: |
          (1 - sli:hotl_check_latency:fast_ratio:rate1d) > (3 * 0.001)
          and
          (1 - sli:hotl_check_latency:fast_ratio:rate2h) > (3 * 0.001)
        for: 5m
        labels:
          severity: warning
          slo: hotl_check_latency
          team: platform
          subsystem: hotl
          runbook_url: "https://github.com/zw008/xiaoguai/blob/main/docs/runbooks/hotl-escalation-stuck.md"
        annotations:
          summary: "HotL check latency SLO burning budget at 3x (warning, 1d+2h windows)"
          description: >
            The hotl_check_latency SLO is burning its error budget at >=3x the steady-state rate.
            At this rate the full 28-day budget is exhausted in ~9.3 days.
            Error ratio (1d window): {{ printf "%.4f" (index . "value") }}.
          dashboard_url: "https://grafana.internal/d/xiaoguai-slo-burnrate?orgId=1&var-slo=hotl_check_latency"
          perf_budget_doc: "https://github.com/zw008/xiaoguai/blob/docs/perf-budget-wave3/docs/architecture/perf-budget-wave3.md"

      # Pair 4 — warning/ticket: 1× / 3d + 6h
      - alert: HotlCheckLatencyBurnRateWarning3d6h
        expr: |
          (1 - sli:hotl_check_latency:fast_ratio:rate3d) > (1 * 0.001)
          and
          (1 - sli:hotl_check_latency:fast_ratio:rate6h) > (1 * 0.001)
        for: 5m
        labels:
          severity: warning
          page: "false"
          ticket: "true"
          slo: hotl_check_latency
          team: platform
          subsystem: hotl
          runbook_url: "https://github.com/zw008/xiaoguai/blob/main/docs/runbooks/hotl-escalation-stuck.md"
        annotations:
          summary: "HotL check latency SLO burning budget at 1x (ticket, 3d+6h windows)"
          description: >
            The hotl_check_latency SLO is burning its error budget at >=1x the steady-state rate
            (i.e. budget will not be replenished at current rate). File a ticket.
