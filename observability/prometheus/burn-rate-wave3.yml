      # ----------------------------------------------------------
      # outcomes_summary — p95 SLO: 200 ms (99%)
      # ----------------------------------------------------------
      - record: sli:outcomes_summary:fast_ratio:rate5m
        expr: |
          sum(rate(xiaoguai_outcomes_summary_duration_seconds_bucket{le="0.2"}[5m]))
