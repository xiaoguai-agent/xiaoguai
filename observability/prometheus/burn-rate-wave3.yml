---
# Wave-3 Multi-Window Multi-Burn-Rate (MWMBR) SLO Alerting Rules
#
# Model: Google SRE Workbook ch.5 — "Alerting on SLOs"
# https://sre.google/workbook/alerting-on-slos/
#
# Error budget window: 28 days
# 28d = 2,419,200 seconds
#
# Canonical 4-pair burn-rate table (all SLOs):
#
#  Pair | Severity | Long window | Short window | Burn rate | Pages?
#  -----|----------|-------------|--------------|-----------|-------
#    1  | critical |     1h      |      5m      |   14.4×   |  yes
#    2  | critical |     6h      |     30m      |    6×     |  yes
#    3  | warning  |     1d      |      2h      |    3×     |  yes
#    4  | warning  |     3d      |      6h      |    1×     | ticket
#
# Burn-rate rationale (pair 1, 14.4×):
#   At a 14.4× burn rate the 28-day error budget is exhausted in
#   28d / 14.4 ≈ 1.94d ≈ 46.7 h.  A 1h long window ensures we've
#   seen sustained burn before paging (not a 1-minute spike).
#   The 5m short window catches the same burst a few minutes after onset,
#   so both windows must fire simultaneously — this dramatically reduces
#   false positives caused by brief traffic blips.
#
# SLO targets (from docs/architecture/perf-budget-wave3.md):
#
#  SLO name             | Metric prefix                          | p95 budget | error ratio
#  ---------------------|----------------------------------------|------------|------------
#  hotl_check_latency   | xiaoguai_hotl_check_duration_seconds   | 25 ms      | 0.001 (99.9%)
#  outcomes_record      | xiaoguai_outcomes_record_duration_sec  | 50 ms      | 0.001 (99.9%)
#  outcomes_summary     | xiaoguai_outcomes_summary_duration_sec | 200 ms     | 0.010 (99%)
#  outcomes_timeseries  | xiaoguai_outcomes_timeseries_dur_sec   | 500 ms     | 0.010 (99%)
#  skills_installed     | xiaoguai_skills_installed_duration_sec | 100 ms     | 0.010 (99%)
#  hotl_policies_write  | xiaoguai_hotl_policies_write_dur_sec   | 100 ms     | 0.010 (99%)
#  hotl_availability    | xiaoguai_hotl_requests_total           | n/a        | 0.001 (99.9%)
#  outcomes_avail       | xiaoguai_outcomes_requests_total       | n/a        | 0.0005 (99.95%)
#
# Recording rule naming convention:
#   sli:<slo_name>:fast_ratio:rate<window>
#   sli:<slo_name>:error_ratio:rate<window>
#
# Alert naming convention:
#   <SloName>BurnRate<severity><windows>
#   e.g. HotlCheckLatencyBurnRateCritical1h5m

# ============================================================
# GROUP 1 — Recording rules for latency SLI fast ratios
# ============================================================
groups:
  - name: wave3-slo-recording-rules
    interval: 1m
    rules:

      # ----------------------------------------------------------
      # hotl_check_latency — p95 SLO: 25 ms (99.9%)
      # fast request = completed in ≤ 25 ms (le="0.025" bucket)
      # ----------------------------------------------------------
      - record: sli:hotl_check_latency:fast_ratio:rate5m
        expr: |
          sum(rate(xiaoguai_hotl_check_duration_seconds_bucket{le="0.025"}[5m]))
          /
          sum(rate(xiaoguai_hotl_check_duration_seconds_count[5m]))

      - record: sli:hotl_check_latency:fast_ratio:rate30m
        expr: |
          sum(rate(xiaoguai_hotl_check_duration_seconds_bucket{le="0.025"}[30m]))
          /
          sum(rate(xiaoguai_hotl_check_duration_seconds_count[30m]))

      - record: sli:hotl_check_latency:fast_ratio:rate1h
        expr: |
          sum(rate(xiaoguai_hotl_check_duration_seconds_bucket{le="0.025"}[1h]))
          /
          sum(rate(xiaoguai_hotl_check_duration_seconds_count[1h]))

      - record: sli:hotl_check_latency:fast_ratio:rate2h
