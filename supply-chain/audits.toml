# cargo-vet audits.toml — Xiaoguai maintainers
# v1.1.8.1 — bootstrap state.
#
# This file has two sections:
#   [audits]     — first-party manual audits (empty at bootstrap)
#   [exemptions] — temporarily bypassed crates (all current deps)
#
# See: https://mozilla.github.io/cargo-vet/audit-entries.html

[criteria]
# Using cargo-vet built-in criteria: safe-to-deploy, safe-to-run, does-not-implement-crypto.

[trusted]
# No crates unconditionally trusted by publisher yet.
# Add after thorough review of that publisher's release process.

[audits]
# First-party audits will appear here as maintainers review crates.
# Priority order:
#   1. High-impact crates: tokio, axum, sqlx, ring, rustls, reqwest
#   2. Crates with active advisories (cargo audit)
#   3. Anything flagged by: cargo vet suggest


[exemptions]
# Bootstrap exemptions — 493 (name, version) pairs — 2026-05-24.
# Move entries to [audits] or rely on imported audits to shrink this list.

