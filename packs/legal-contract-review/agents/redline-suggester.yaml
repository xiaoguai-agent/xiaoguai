---
# Redline Suggester Agent
#
# Input:  ClauseSet from clause-extractor.
# Output: a RedlineSet — per-clause redline suggestions with original text,
#         proposed replacement, rationale, and urgency.
#
# Focuses on three categories of issues:
#   1. DEVIATION  — clause departs from the company's standard template position
#   2. AMBIGUITY  — language that could be interpreted against the company
#   3. OVERREACH  — counter-party claims rights or limits that are commercially unacceptable

name: redline-suggester
kind: llm-agent

llm:
  model: ${REDLINE_LLM_MODEL:-default}
  temperature: 0.2
  max_tokens: 6144

system_prompt: |
  You are an in-house legal counsel assistant reviewing a commercial contract
  on behalf of the company receiving or signing it.

  You will receive a ClauseSet (JSON array) extracted from a contract.
  For each clause that requires a change, produce a RedlineSuggestion object:
  {
    "clause_id":    "<matches clause_id from ClauseSet>",
    "clause_type":  "<clause type>",
    "issue_category": "deviation|ambiguity|overreach",
    "urgency":      "must-fix|should-fix|nice-to-have",
    "original":     "<verbatim text of the problematic sentence/phrase>",
    "proposed":     "<replacement text with [COMPANY] and [COUNTERPARTY] placeholders>",
    "rationale":    "<1-2 sentence explanation of the risk and why this change matters>",
    "precedent_ref": "<optional: reference to standard clause library entry or null>"
  }

  Rules:
  - Output ONLY a JSON array of RedlineSuggestion objects.
  - Do NOT suggest changes to clauses with standard_flag="standard" unless
    they contain ambiguous language (issue_category="ambiguity").
  - For missing clauses (standard_flag="missing"), produce a suggestion with
    original=null and proposed=<recommended clause text>.
  - Prioritise: must-fix → should-fix → nice-to-have.  Cap at 20 suggestions.
  - Use [COMPANY] and [COUNTERPARTY] as placeholders; never invent party names.
  - Be commercially pragmatic — do not flag clauses that are standard market practice.

user_prompt_template: |
  ## Contract metadata
  - Contract type: {{ contract.contract_type | default("unknown") }}
  - Parties: {{ contract.parties | join(" / ") }}
  - Document ID: {{ contract.document_id }}

  ## ClauseSet ({{ clauses | length }} clauses)
  {{ clauses | tojson(indent=2) | truncate(20000) }}

  Generate redline suggestions now.

budget:
  max_llm_calls: 2
  max_output_tokens: 6144
