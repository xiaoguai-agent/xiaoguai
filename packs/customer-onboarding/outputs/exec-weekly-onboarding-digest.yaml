# packs/customer-onboarding/outputs/exec-weekly-onboarding-digest.yaml
#
# Output: Executive weekly onboarding digest
#
# Sent every Monday at 08:00 to the exec distribution list (and CSM leadership).
# Aggregates onboarding health across all active customers: milestone progress,
# stall counts by category, and week-over-week POC score trends.

name: exec-weekly-onboarding-digest
kind: scheduled-report

schedule:
  expression: "0 8 * * 1"     # every Monday at 08:00
  timezone: "${TZ:-Asia/Shanghai}"

# Data assembly query — runs at send time
data_query: |
  WITH active AS (
      SELECT DISTINCT customer_id FROM onboarding_milestones WHERE status = 'in_progress'
  ),
  stall_counts AS (
      SELECT category, COUNT(*) AS cnt
      FROM   stall_signals
      WHERE  status = 'open'
        AND  customer_id IN (SELECT customer_id FROM active)
      GROUP  BY category
  ),
  weekly_completions AS (
      SELECT COUNT(*) AS completed_this_week
      FROM   onboarding_milestones
      WHERE  status = 'completed'
        AND  completed_at >= now() - INTERVAL '7 days'
  ),
  weekly_stalls AS (
      SELECT COUNT(*) AS stalls_opened_this_week
      FROM   stall_signals
      WHERE  opened_at >= now() - INTERVAL '7 days'
  ),
  at_risk AS (
      SELECT m.customer_id, m.stage, m.deadline_at,
             now() - m.deadline_at AS overdue_by
      FROM   onboarding_milestones m
      WHERE  m.status IN ('in_progress', 'overdue')
        AND  m.deadline_at < now() + INTERVAL '7 days'
      ORDER  BY m.deadline_at ASC
      LIMIT  10
  ),
  avg_poc_score AS (
      SELECT AVG(poc_score) AS avg_poc_score
      FROM   onboarding_milestones
      WHERE  stage IN ('poc_criteria_met', 'expansion_ready')
        AND  completed_at >= now() - INTERVAL '30 days'
        AND  poc_score IS NOT NULL
  )
  SELECT
      (SELECT COUNT(*) FROM active)                       AS total_active_customers,
      (SELECT completed_this_week FROM weekly_completions) AS milestones_completed_7d,
      (SELECT stalls_opened_this_week FROM weekly_stalls)  AS stalls_opened_7d,
      (SELECT COALESCE(json_object_agg(category, cnt), '{}') FROM stall_counts) AS stall_by_category,
      (SELECT COALESCE(json_agg(at_risk), '[]') FROM at_risk) AS at_risk_list,
      (SELECT ROUND(avg_poc_score * 100, 1) FROM avg_poc_score) AS avg_poc_score_30d

# Delivery targets
delivery:
  - channel: slack
    channel_env: SLACK_EXEC_CHANNEL_ID
    token_env: SLACK_BOT_TOKEN
    format: markdown

  - channel: email
    to_env: EXEC_DIGEST_EMAIL_LIST    # comma-separated emails
    subject: "Weekly Onboarding Digest — {{ week_of }}"
    format: html

template: |
  # Weekly Onboarding Digest — Week of {{ week_of }}

  ## At a Glance

  | Metric | Value |
  |--------|-------|
  | Active Customers in Onboarding | {{ total_active_customers }} |
  | Milestones Completed (7 days) | {{ milestones_completed_7d }} |
  | Stalls Opened (7 days) | {{ stalls_opened_7d }} |
  | Avg POC Score (30 days) | {{ avg_poc_score_30d | default("N/A") }}% |

  ## Stalls by Category

  | Category | Open Count |
  |----------|:----------:|
  {% for category, count in stall_by_category.items() %}
  | {{ category | replace("-", " ") | title }} | {{ count }} |
  {% endfor %}

  ## Customers At Risk (Next 7 Days)

  {% if at_risk_list %}
  | Customer | Stage | Deadline | Overdue By |
  |----------|-------|----------|-----------|
  {% for r in at_risk_list %}
  | {{ r.customer_id }} | {{ r.stage }} | {{ r.deadline_at | date("MM-DD") }} | {% if r.overdue_by %}{{ r.overdue_by }}{% else %}On track{% endif %} |
  {% endfor %}
  {% else %}
  No customers at immediate risk. ✅
  {% endif %}

  ---
  *Generated by xiaoguai Customer Onboarding Pack*

mock:
  enabled_when: "XIAOGUAI_ENV != 'production'"
  mock_target: co_audit_log
