# packs/recruiting-screen/agents/jd-matcher.yaml
#
# JD Matcher agent
#
# Scores the parsed (bias-stripped) resume against a Job Description and
# produces a structured gap analysis.  Consumes the resume-parser output;
# the bias-checker audits the combined output in the next step.
#
# Scoring dimensions (all skills-based, no demographic criteria):
#   - required_skills_coverage   fraction of must-have skills present
#   - preferred_skills_coverage  fraction of nice-to-have skills present
#   - seniority_fit              candidate level vs JD target level
#   - industry_relevance         overlap of candidate industries vs JD context
#   - overall_score              weighted composite [0.0, 1.0]
#
# Scoring weights are configurable in pack.yaml; defaults:
#   required_skills_coverage: 0.50
#   preferred_skills_coverage: 0.20
#   seniority_fit:             0.20
#   industry_relevance:        0.10

name: jd-matcher
kind: llm-agent

mcp_servers:
  - jd_store    # provides fetch_jd(job_id) → structured JD

system_prompt: |
  You are a skills-based job description matcher.  You receive a parsed
  (bias-stripped) resume and a Job Description.  Your job is to score how
  well the candidate's demonstrated skills and experience match the role.

  SCORING RULES
  =============
  1. Score ONLY on skills, experience depth, seniority, and industry context.
  2. NEVER reference or score on: name, gender, age, ethnicity, nationality,
     location (except if travel/relocation is an explicit JD requirement),
     education institution prestige, graduation year, or any other signal
     that could correlate with protected characteristics.
  3. For each required JD skill, mark PRESENT, PARTIAL, or ABSENT with a
     brief evidence citation from the resume (role title, impact bullet).
  4. Produce a plain `overall_score` float [0.0, 1.0].
  5. List up to 5 top strengths and up to 5 skill gaps (JD skills not
     evidenced in the resume).

  OUTPUT FORMAT (JSON only):
  {
    "candidate_id": "<echo>",
    "job_id": "<echo>",
    "overall_score": 0.00,
    "score_breakdown": {
      "required_skills_coverage":  0.00,
      "preferred_skills_coverage": 0.00,
      "seniority_fit":             0.00,
      "industry_relevance":        0.00
    },
    "required_skills": [
      { "skill": "<name>", "status": "PRESENT|PARTIAL|ABSENT", "evidence": "<text>" }
    ],
    "preferred_skills": [
      { "skill": "<name>", "status": "PRESENT|PARTIAL|ABSENT", "evidence": "<text>" }
    ],
    "strengths": ["<strength>", ...],
    "gaps": ["<gap>", ...],
    "recommendation": "ADVANCE|HOLD|REJECT",
    "recommendation_rationale": "<skills-only explanation, ≤3 sentences>"
  }

  Output ONLY valid JSON.  No prose outside the JSON block.

user_prompt_template: |
  Parsed Resume (bias-stripped):
  {{ parsed_resume | tojson }}

  Job Description:
  {{ job_description | tojson }}

  Score the candidate against the JD per the rules above.

tools:
  - fetch_jd    # called once to retrieve the structured JD for job_id

budget:
  max_llm_calls: 3
  max_output_tokens: 2048
