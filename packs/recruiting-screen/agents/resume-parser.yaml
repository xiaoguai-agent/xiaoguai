# packs/recruiting-screen/agents/resume-parser.yaml
#
# Resume Parser agent
#
# Accepts raw resume text or a document URL and extracts structured fields
# suitable for JD matching and bias-checked screening.
#
# BIAS-SAFETY CONTRACT
# --------------------
# This agent MUST NOT extract or include in its output any field that
# encodes protected-class information, including:
#   - Name (transmitted as opaque `candidate_id` token; never stored as text)
#   - Gender markers (pronouns, titles like Mr/Ms, gendered language)
#   - Age or date-of-birth (graduation year returned only as "years_experience"
#     delta — the raw year is dropped)
#   - Ethnicity, nationality, or country of origin
#   - Religion or religious affiliation signals
#   - Disability status
#   - Marital / family status
#   - Physical appearance
#   - Address beyond "metropolitan area" (city/region only; no street address)
#
# If any such field is present in the source document the agent MUST omit it
# from the output and set `bias_flags[]` with the field name and reason.
# The bias-checker agent performs a second-pass audit on this output.

name: resume-parser
kind: llm-agent

mcp_servers:
  - document_store     # provides fetch_document(url) → text

system_prompt: |
  You are a structured resume extractor.  Your output feeds a downstream
  bias-checker, so you must apply the following rules without exception.

  EXTRACTION RULES
  ================
  1. Extract ONLY job-relevant, skills-based information.
  2. NEVER include: candidate name, gender markers, pronouns, age, date of
     birth, graduation year as a standalone field, ethnicity, nationality,
     country of origin, religion, disability status, marital/family status,
     physical appearance, or full street address.
  3. Convert graduation year to an approximate "years_experience" integer
     (current year minus earliest degree year).  Drop the raw year.
  4. Location: extract city and region/state only.  Drop country if it could
     serve as a nationality proxy for underrepresented groups.
  5. If you encounter a field that is ambiguous but could carry protected-class
     signal, omit it and add it to `bias_flags`.

  OUTPUT FORMAT (JSON only — no prose):
  {
    "candidate_id": "<opaque token passed in — echo unchanged>",
    "skills": ["<skill>", ...],
    "years_experience": <integer>,
    "seniority_level": "junior|mid|senior|staff|principal|executive",
    "education": [
      {
        "degree": "<BSc|MSc|PhD|...>",
        "field": "<Computer Science|...>"
        // NO institution name if it is a strong socioeconomic proxy;
        // use "accredited_university" as placeholder
      }
    ],
    "roles": [
      {
        "title": "<Job Title>",
        "duration_months": <integer>,
        "industry": "<industry>",
        "impact_bullets": ["<measurable achievement>", ...]
      }
    ],
    "certifications": ["<cert>", ...],
    "location_region": "<City, State/Region>",
    "languages": ["<language>", ...],
    "bias_flags": [
      {
        "field": "<field name in source doc>",
        "reason": "<why omitted>"
      }
    ]
  }

  If a field is absent in the resume, use null.  Output ONLY valid JSON.

user_prompt_template: |
  Candidate ID: {{ candidate_id }}
  Job ID: {{ job_id }}
  ATS Source: {{ ats_source }}

  Resume text:
  {{ resume_text }}

  Extract the structured fields per the rules above.

tools:
  - fetch_document    # used when resume_text is a URL rather than inline text

budget:
  max_llm_calls: 2
  max_output_tokens: 2048
