# Output adapter — Slack content review (HOTL gate)
#
# Posts all generated drafts to a designated Slack review channel and waits
# for a human approval reaction before allowing downstream publish adapters
# (ghost-blog-draft, mailchimp-campaign) to run.
#
# Approval mechanic:
#   - Bot posts a structured message summarising all three artefacts
#     (longform, social snippets, email sequence).
#   - Reviewers react with ✅ to approve or ❌ to reject.
#   - xiaoguai-scheduler polls the Slack API every 5 minutes for reactions.
#   - After `approval_timeout_hours` (pack config default: 72h) with no
#     action, the run is marked "expired" and no publish adapters fire.
#   - A reminder is posted after `remind_after_hours` (default: 24h).
#
# Suppression:
#   If a reviewer reacts ❌, all downstream publish steps are suppressed and
#   an audit entry is written with rejection_reason from the thread reply.

name: slack-content-review
kind: slack-message

# Slack bot credentials.
bot_token_env: SLACK_BOT_TOKEN
channel_id_env: SLACK_REVIEW_CHANNEL_ID

# Message template (Slack Block Kit JSON).
# Tera variables available: longform, social, email_sequence, run_id,
# brief_title, pack_version.
message_template: |
  {
    "blocks": [
      {
        "type": "header",
        "text": {
          "type": "plain_text",
          "text": "📝 Content Review — {{ brief_title | truncate(60, true) }}"
        }
      },
      {
        "type": "section",
        "fields": [
          { "type": "mrkdwn", "text": "*Article title:*\n{{ longform.title | truncate(80, true) }}" },
          { "type": "mrkdwn", "text": "*Word count:*\n{{ longform.word_count }}" },
          { "type": "mrkdwn", "text": "*Reading time:*\n~{{ longform.reading_time_minutes }} min" },
          { "type": "mrkdwn", "text": "*Run ID:*\n`{{ run_id }}`" }
        ]
      },
      {
        "type": "section",
        "text": {
          "type": "mrkdwn",
          "text": "*Meta description:*\n{{ longform.meta_description }}"
        }
      },
      {
        "type": "divider"
      },
      {
        "type": "section",
        "text": {
          "type": "mrkdwn",
          "text": "*Social snippets generated:* Twitter · LinkedIn · Instagram · TikTok hook · Threads\n*Email nurture:* 3-email sequence (Days {{ email_sequence[0].send_day }}, {{ email_sequence[1].send_day }}, {{ email_sequence[2].send_day }})"
        }
      },
      {
        "type": "actions",
        "elements": [
          {
            "type": "button",
            "text": { "type": "plain_text", "text": "✅ Approve & Publish" },
            "style": "primary",
            "value": "approve:{{ run_id }}"
          },
          {
            "type": "button",
            "text": { "type": "plain_text", "text": "❌ Reject" },
            "style": "danger",
            "value": "reject:{{ run_id }}"
          }
        ]
      },
      {
        "type": "context",
        "elements": [
          {
            "type": "mrkdwn",
            "text": "Generated by xiaoguai marketing-content pack v{{ pack_version }}. React ✅ to approve all artefacts for publishing, ❌ to reject. Expires in 72 h."
          }
        ]
      }
    ]
  }

# HOTL gate configuration.
hotl:
  enabled: true
  approve_reaction: "white_check_mark"   # ✅
  reject_reaction: "x"                   # ❌
  approval_timeout_hours: 72
  remind_after_hours: 24
  reminder_text: "Reminder: content review is waiting for your approval. Run ID: `{{ run_id }}`"

# Audit entry written for every review action.
audit:
  table: marketing_content_runs
  fields:
    - run_id
    - brief_title
    - reviewer_slack_user_id
    - action               # approved | rejected | expired
    - action_at
    - rejection_reason     # populated from thread reply when rejected
