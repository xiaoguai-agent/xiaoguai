# Inbound trigger — manual brief submission via HTTP POST
#
# Accepts a structured creative brief submitted directly via the xiaoguai API.
# Useful for ad-hoc content requests, CLI-driven pipelines, or internal tooling
# that does not use Notion or Contentful.
#
# Endpoint:
#   POST https://<host>/v1/packs/marketing-content/briefs
#
# Authentication: Bearer token (env: MANUAL_BRIEF_API_TOKEN).
# The token is validated by the xiaoguai-api gateway before the payload
# reaches this pack; no additional signature step is required.
#
# Example request body (JSON):
# {
#   "brief_title": "How We Reduced CI Build Time by 60%",
#   "brief_summary": "A case study on...",
#   "target_audience": "senior software engineers at scale-ups",
#   "key_messages": ["faster CI = happier developers", "..."],
#   "desired_action": "Sign up for the CI optimisation newsletter",
#   "word_count_target": 2000,
#   "brand_voice_ref": "engineering-blog",
#   "seo_keywords": ["CI/CD optimisation", "GitHub Actions speed"],
#   "list_segment": "engineering-audience"
# }

name: manual-brief-submit
kind: http-post

# Route path registered in the API gateway.
route_path: "/v1/packs/marketing-content/briefs"

# Authentication via the xiaoguai-api gateway Bearer token check.
auth:
  kind: bearer
  token_env: MANUAL_BRIEF_API_TOKEN

# JSON Schema validation applied to the incoming payload before any agent runs.
# The request is rejected with HTTP 422 if validation fails.
request_schema:
  type: object
  required: [brief_title, brief_summary, target_audience, key_messages, desired_action]
  properties:
    brief_title:
      type: string
      minLength: 5
      maxLength: 200
    brief_summary:
      type: string
      minLength: 20
      maxLength: 2000
    target_audience:
      type: string
      minLength: 5
      maxLength: 500
    key_messages:
      type: array
      minItems: 1
      maxItems: 10
      items:
        type: string
        minLength: 5
    desired_action:
      type: string
      minLength: 5
      maxLength: 300
    word_count_target:
      type: integer
      minimum: 300
      maximum: 4000
    brand_voice_ref:
      type: string
    seo_keywords:
      type: array
      items:
        type: string
    list_segment:
      type: string

# Fields passed directly to the plan context (no JSONPath extraction needed —
# the body is already flat JSON).
passthrough_fields:
  - brief_title
  - brief_summary
  - target_audience
  - key_messages
  - desired_action
  - word_count_target
  - brand_voice_ref
  - seo_keywords
  - list_segment

# Synchronous response: return a run ID immediately so the caller can poll.
response:
  sync: false
  body:
    run_id: "{{ run_id }}"
    status_url: "/v1/packs/marketing-content/runs/{{ run_id }}"
