---
# Corporate Secretary Archive — Immutable WORM Storage
# Archives final approved minutes, resolutions, and board packs to
# immutable WORM (Write Once Read Many) storage as required for corporate
# governance records.
#
# Once archived, records MUST NOT be altered. Any correction must be
# recorded as a separate amendment minute, not by modifying the original.
#
# HOTL gate: archival of minutes is explicitly gated — corporate secretary
# must confirm before WORM write. Archival is irreversible.
#
# Storage targets: AWS S3 Object Lock, Azure Blob Immutable Storage, or
# Google Cloud Storage with Object Hold — operator configures one provider.

output: corporate-secretary-archive

hotl:
  require_human_approval: true
  approver_role: corporate_secretary
  notify_channel: "${BOARD_PREP_SECRETARY_CHANNEL:-admin_ui}"
  # Strong warning shown to approver
  approval_warning: >
    IRREVERSIBLE: Once archived to WORM storage, this document cannot be
    modified or deleted. Ensure minutes are in final approved form before
    confirming.

storage:
  # -- AWS S3 Object Lock (Compliance mode) --
  provider: s3_object_lock
  bucket:   ${BOARD_PREP_ARCHIVE_S3_BUCKET}
  prefix:   "${BOARD_PREP_ARCHIVE_S3_PREFIX:-board-records/}"
  region:   ${BOARD_PREP_ARCHIVE_S3_REGION:-us-east-1}
  # Retention period in years (7 years is common corporate records requirement)
  retention_years: ${BOARD_PREP_ARCHIVE_RETENTION_YEARS:-7}
  lock_mode: COMPLIANCE   # COMPLIANCE mode: even root cannot delete

  # -- Azure Blob Immutable Storage (uncomment to use instead) --
  # provider: azure_blob_immutable
  # account_name: ${BOARD_PREP_AZURE_STORAGE_ACCOUNT}
  # container:    ${BOARD_PREP_AZURE_CONTAINER}
  # sas_token:    ${BOARD_PREP_AZURE_SAS_TOKEN}
  # retention_days: ${BOARD_PREP_ARCHIVE_RETENTION_DAYS:-2555}

# Documents archived per approved meeting
documents:
  - type: approved_minutes
    filename_template: "{{ meeting.scheduled_at | format_datetime(fmt='%Y/%Y-%m-%d') }}-minutes-approved.pdf"
  - type: resolutions
    filename_template: "{{ meeting.scheduled_at | format_datetime(fmt='%Y/%Y-%m-%d') }}-resolutions.json"
  - type: approved_agenda
    filename_template: "{{ meeting.scheduled_at | format_datetime(fmt='%Y/%Y-%m-%d') }}-agenda-approved.pdf"

# After successful WORM write, record the immutable reference in board_minutes
post_archive:
  update_worm_ref: true    # sets board_minutes.worm_ref + archived_at

emits_event: board.minutes_archived
