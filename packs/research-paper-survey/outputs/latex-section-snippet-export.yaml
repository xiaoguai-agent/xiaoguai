# packs/research-paper-survey/outputs/latex-section-snippet-export.yaml
#
# Output connector: LaTeX Section Snippet Export
#
# Converts a drafted survey section (Markdown) to a LaTeX snippet and writes
# it to the configured export directory. One .tex file per topic cluster.
#
# The conversion pipeline:
#   1. Render the survey-section-skeleton Markdown template (done by survey-section-drafter).
#   2. Convert Markdown → LaTeX via Pandoc (xiaoguai_pandoc tool).
#   3. Post-process: wrap in \section{...}, fix citation keys to \cite{...} format,
#      and apply the configured LaTeX style (biblatex or natbib).
#   4. Write to LATEX_EXPORT_DIR/<survey_run_id>/<cluster_slug>.tex.
#
# Requires: Pandoc >= 3.0 installed on the host (or available via xiaoguai-pandoc container).

output: latex-section-snippet-export

# ── Conversion settings ───────────────────────────────────────────────────────

conversion:
  tool: xiaoguai_pandoc
  from_format: markdown
  to_format: latex
  pandoc_args:
    - "--wrap=none"
    - "--top-level-division=section"

# ── LaTeX post-processing ─────────────────────────────────────────────────────

post_process:
  # Replace [AuthorYear] citation markers with \cite{AuthorYear}.
  citation_style: "${LATEX_CITATION_STYLE:-biblatex}"   # biblatex | natbib
  citation_regex: "\\[([A-Za-z]+\\d{4}[a-z]?)\\]"
  citation_replacement: "\\cite{$1}"

  # Wrap in \section{...} using the cluster label.
  wrap_section: true
  section_command: "\\section"

  # Append a bibliography entry stub for each cited paper (commented out;
  # researcher fills in the .bib file separately).
  append_bib_stubs: true
  bib_stub_template: |
    % @article{{{ cite_key }}},
    %   author = {{{ authors }}},
    %   title  = {{{ title }}},
    %   year   = {{{ year }}},
    %   {% if arxiv_id %}eprint = {{{ arxiv_id }}}, eprinttype = {arXiv},{% endif %}
    % }

# ── File output ───────────────────────────────────────────────────────────────

file:
  # Output directory; created if it does not exist.
  base_dir: "${LATEX_EXPORT_DIR:-./survey_export}"
  # Subdirectory per survey run for organisation.
  subdir: "{{ survey_run.id }}"
  # Filename: slugified cluster label.
  filename: "{{ cluster.label | slugify }}.tex"
  # Encoding: UTF-8 (required for non-ASCII author names).
  encoding: utf-8
  # If a file already exists, append a timestamped suffix rather than overwrite.
  on_conflict: append_suffix

# ── Summary file ─────────────────────────────────────────────────────────────
#
# After all sections for a survey run are exported, write a top-level
# main.tex that \input{}'s each section file in cluster order.

summary_file:
  enabled: true
  filename: "main.tex"
  template: |
    % Auto-generated by xiaoguai research-paper-survey pack
    % Survey: {{ survey_run.topic }}
    % Generated: {{ now() | datetime_format('%Y-%m-%d') }}

    \documentclass{article}
    \usepackage[backend=biber]{biblatex}
    \addbibresource{references.bib}

    \title{ {{ survey_run.topic }} }
    \date{ {{ now() | datetime_format('%B %Y') }} }

    \begin{document}
    \maketitle

    {% for section_file in section_files | sort -%}
    \input{ {{ section_file }} }
    {% endfor %}

    \printbibliography
    \end{document}

# ── Error handling ────────────────────────────────────────────────────────────

on_error:
  action: log_warning
  message: "LaTeX export failed for cluster '{{ cluster.label }}': {{ error }}. Check Pandoc installation."
