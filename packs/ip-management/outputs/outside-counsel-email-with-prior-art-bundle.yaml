# Output connector — outside counsel email with prior-art bundle
# ---------------------------------------------------------------------------
# Sends the prior-art report + attached reference documents to the configured
# outside-counsel email address.  Used by the prior-art-discoverer agent
# after human approval of the prior-art report.
#
# The bundle contains:
#   - Rendered prior-art-report.md (PDF-converted)
#   - Up to 10 top-ranked reference PDFs (downloaded from USPTO / EPO / DOI)
#   - An IDS (Information Disclosure Statement) draft pre-filled with the
#     confirmed references (USPTO Form PTO/SB/08 layout)
#
# All sends require human approval (HOTL-gated in prior-art-discoverer).
# ---------------------------------------------------------------------------

output: outside-counsel-email-with-prior-art-bundle
version: "1.0.0"
description: >
  Packages and emails the prior-art report + reference PDFs to outside
  patent counsel.  Requires human approval before sending.

email:
  from:    "${IP_EMAIL_FROM:-ip@company.com}"
  to:      "${IP_OUTSIDE_COUNSEL_EMAIL}"
  cc:      "${IP_INSIDE_COUNSEL_EMAIL}"
  subject: "Prior Art Search Report — {{ context.application_details.application_number }} — {{ context.application_details.title | truncate(60) }}"

  body_template: |
    Dear {{ outside_counsel_name | default('Counsel') }},

    Please find attached the automated prior art search report for:

      Application: {{ context.application_details.application_number }}
      Title:       {{ context.application_details.title }}
      Filed:       {{ context.application_details.filing_date }}

    The report identifies {{ report.ranked_references | length }} reference(s),
    of which {{ report.ranked_references | selectattr('novelty_impact', 'in', ['anticipates', 'obvious']) | list | length }}
    are rated as novelty-threatening (anticipates or obvious).

    Overall risk assessment: {{ report.overall_risk | upper }}
    Search adequacy: {{ report.search_adequacy | replace('_', ' ') | title }}

    Please review the attached report and advise on:
    1. Whether any references require IDS disclosure.
    2. Claim amendment strategies for high-relevance references.
    3. Whether additional manual searching is warranted.

    This report was generated by an automated AI system and is provided for
    informational purposes.  It does not constitute a legal opinion and should
    be independently verified by qualified patent counsel.

    Regards,
    {{ sender_name | default('IP Management System') }}
    {{ tenant_name }}

attachments:
  # Rendered prior-art report (Markdown → PDF via wkhtmltopdf or weasyprint)
  - kind: rendered_template
    template: "templates/prior-art-report.md.j2"
    format: pdf
    filename: "prior-art-report-{{ context.application_details.application_number }}-{{ now() | date('%Y%m%d') }}.pdf"

  # Top-ranked reference PDFs (downloaded from source URLs)
  - kind: fetched_documents
    source_table: ip_prior_art_findings
    filter: >
      patent_id = '{patent_id}'
      AND tenant_id = '{tenant_id}'
      AND relevance_score >= 0.60
      AND review_status IN ('pending', 'confirmed')
    order_by: "relevance_score DESC"
    limit: 10
    filename_pattern: "ref-{{ loop.index }}-{{ reference_id | slugify }}.pdf"
    fetch_sources:
      - kind: google_patents
        url_template: "https://patents.google.com/patent/{{ reference_id }}/en?embed=true"
      - kind: espacenet
        url_template: "https://worldwide.espacenet.com/patent/search?q=pn%3D{{ reference_id }}"
      - kind: doi
        url_template: "https://doi.org/{{ reference_id }}"   # for academic papers

  # IDS pre-fill (USPTO PTO/SB/08 compatible CSV)
  - kind: ids_draft
    filename: "ids-draft-{{ context.application_details.application_number }}.csv"
    columns:
      - "Patent Number"
      - "Country"
      - "Date"
      - "Name of Patentee or Applicant"
      - "Title"
    source_table: ip_prior_art_findings
    filter: >
      patent_id = '{patent_id}'
      AND tenant_id = '{tenant_id}'
      AND reference_kind = 'patent'
      AND review_status = 'confirmed'
      AND novelty_impact IN ('anticipates', 'obvious')

hotl:
  require_human_approval: true
  # The approval UI shows the rendered email body + attachment list before send.
  preview_before_send: true
  notify_channel: "${IP_MANAGEMENT_NOTIFY_CHANNEL:-admin_ui}"

error_handling:
  on_attachment_fetch_failure:
    action: skip_attachment_log_warning
    # Do not block the send if a reference PDF cannot be fetched.
  on_send_failure:
    strategy: retry_once
    delay_seconds: 300
    fallback: admin_ui_notification
