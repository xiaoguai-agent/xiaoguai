---
# Secret Leak Scanner Agent
#
# Input:  a git diff (unified diff format) or a batch of commits
#         (commit SHAs + raw patch text).
# Output: list of detected secrets with entropy score, commit/line
#         location, secret type classification, and a ranked rotation
#         order for remediation. Rendered via
#         templates/secret-rotation-checklist.md.j2.
#
# Detection strategy (defense in depth):
#   1. Pattern matching  — regex for known secret formats (AWS keys,
#      GitHub tokens, GCP service account JSON, etc.)
#   2. Entropy analysis  — Shannon entropy > threshold flags candidates
#   3. Context scoring   — variable name / surrounding code boosts confidence
#   4. LLM validation    — LLM confirms or dismisses entropy candidates

name: secret-leak-scanner
description: >
  Given a git diff or commit batch, detect exposed secrets using
  regex pattern matching, Shannon entropy analysis, and context scoring.
  Produce a ranked rotation checklist ordered by blast radius and
  exposure duration, formatted via
  templates/secret-rotation-checklist.md.j2.

# LLM settings — used for entropy candidate validation only.
llm:
  model: ${SECRET_SCAN_LLM_MODEL:-default}
  temperature: 0.05   # Near-deterministic — binary classification task.
  max_tokens: 4096

# Pre-LLM scanning steps (fast, deterministic).
context_steps:
  - id: pattern_scan
    description: "Regex-based secret pattern scan over the diff."
    tool: xiaoguai_secret_scan
    params:
      diff: "{{ diff_text }}"
      rule_set: "${SECRET_SCAN_RULES:-builtin}"
      # Built-in rules cover: AWS, GCP, GitHub, GitLab, Slack, Stripe,
      # Twilio, SendGrid, generic API key patterns, RSA/EC private keys,
      # JWT (HS256 secrets), bcrypt hashes, .env files.

  - id: entropy_candidates
    description: "Shannon entropy scan — strings with entropy > 4.5 bits/char."
    tool: xiaoguai_entropy_scan
    params:
      diff: "{{ diff_text }}"
      threshold: 4.5
      min_length: 20
      # Exclude common high-entropy non-secrets (base64 images, CSS hashes).
      exclude_patterns:
        - "data:image/"
        - "integrity=\"sha"
        - "font-face"
    max_lines: 500

  - id: git_history
    description: "Check if the same secret appeared in prior commits (measures exposure window)."
    tool: bash
    command: >
      git log --all --oneline --diff-filter=A
      --follow -S "{{ context.pattern_scan | extract_field('value') | first | default('') }}"
      -- 2>/dev/null | head -20
    optional: true

system_prompt: |
  You are a security engineer reviewing a git diff for leaked secrets.
  You will receive:
  1. Pattern-matched candidates (high confidence — likely real secrets)
  2. Entropy-flagged candidates (medium confidence — need validation)
  3. Git history showing when each pattern first appeared

  For each candidate, determine:
  - Is it a genuine secret or a false positive (test fixture, example value)?
  - What type of secret is it?
  - What is the blast radius if the secret is valid?
  - What is the recommended rotation urgency?

  Secret types:
  cloud_credential, api_key, database_password, ssh_private_key,
  jwt_secret, oauth_token, webhook_secret, certificate_private_key,
  encryption_key, service_account_json, other

  Rotation urgency:
  - critical: active cloud/production credential, externally reachable
  - high: internal service credential or OAuth token
  - medium: webhook secret or non-production API key
  - low: test fixture or example value (confirm false positive)
  - false_positive: not a real secret

  Rules:
  - Do NOT include the actual secret value in the output — use
    the first 4 chars + "****" + last 4 chars mask.
  - If a secret type is cloud_credential, always mark urgency >= high.
  - Order rotation_order by urgency descending, then exposure_days descending.
  - Respond ONLY with valid JSON matching the SecretScanResult schema.

  SecretScanResult schema:
  {
    "repo": "string",
    "scan_ref": "string (commit SHA or PR ref)",
    "scanned_at": "ISO-8601",
    "total_candidates": integer,
    "confirmed_secrets": integer,
    "false_positives": integer,
    "detected_secrets": [
      {
        "secret_id": "string",
        "type": "string",
        "masked_value": "string (first4****last4)",
        "entropy_score": number,
        "confidence": "high|medium|low",
        "commit_sha": "string",
        "file_path": "string",
        "line_number": integer,
        "first_seen_sha": "string | null",
        "exposure_days": integer | null,
        "rotation_urgency": "critical|high|medium|low|false_positive",
        "blast_radius": "string (brief description of what is at risk)",
        "rotation_steps": ["string"]
      }
    ],
    "rotation_order": ["secret_id"],
    "summary": "2-3 sentence executive summary",
    "overall_severity": "critical|high|medium|low|clean"
  }

user_prompt: |
  ## Repository
  {{ repo }}

  ## Scan ref (commit SHA / PR)
  {{ scan_ref }}

  ## Pattern-matched candidates
  {{ context.pattern_scan | tojson | truncate(3000) }}

  ## Entropy-flagged candidates (entropy > 4.5 bits/char)
  {{ context.entropy_candidates | tojson | truncate(3000) }}

  ## Git history (first appearance of top pattern)
  {{ context.git_history | default("unavailable") | truncate(500) }}

  ## Diff excerpt (first 3000 chars for context)
  {{ diff_text | truncate(3000) }}

  Validate candidates and respond with SecretScanResult JSON.

# Output routing.
outputs:
  - outputs/pagerduty-sec-channel.yaml
  - outputs/jira-sec-ticket.yaml
  - outputs/audit-trail-archive.yaml

# Template for rendered rotation checklist.
template: templates/secret-rotation-checklist.md.j2

# Deferred:
#   - Automated git-history rewrite (BFG Repo Cleaner) trigger
#   - GitHub secret scanning API integration (avoid double-alerting)
#   - Vault/AWS Secrets Manager auto-rotation API calls for critical secrets
