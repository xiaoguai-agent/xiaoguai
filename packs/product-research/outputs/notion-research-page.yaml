---
# Notion Research Page Output Connector
#
# Renders the full research output (themes, JTBD board, opportunity
# scorecard, persona cards) into a structured Notion page inside the
# configured research database.  Each section maps to a named template.

output: notion-research-page

notion:
  # Target Notion database (must have a "Name" title property).
  database_id: ${NOTION_RESEARCH_DB_ID}
  # Page title template.
  page_title: "[Research] {{ run.project_name }} — {{ run.id }}"
  # Icon emoji for the created page.
  icon: "🔬"

  # Sections rendered in order via their respective templates.
  sections:
    - id: theme-report
      template: templates/theme-report.md.j2
      heading: "Themes"
      callout: >
        Auto-generated by xiaoguai product-research pack.
        Review and annotate before sharing.

    - id: jtbd-board
      template: templates/jtbd-board.md.j2
      heading: "Jobs to Be Done"

    - id: opportunity-brief
      template: templates/opportunity-brief.md.j2
      heading: "Opportunity Scorecard"

    - id: persona-cards
      template: templates/persona-card.md.j2
      heading: "Personas"
      # Rendered once per persona in the PersonaSet.
      repeat_over: personas

  # Notion database properties set on the created page.
  properties:
    Status: "Draft"
    Project: "{{ run.project_name }}"
    ResearchRun: "{{ run.id }}"
    Participants: "{{ run.total_participants }}"
    GeneratedAt: "{{ run.generated_at }}"

# Deferred:
#   - Append-to-existing-page mode (update instead of create).
#   - Auto-link to parent project page in Notion.
