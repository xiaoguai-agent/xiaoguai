---
# Persona Synthesizer Agent
#
# Input:  a ThemeSet (from transcript-themer) + JTBDMap (from jtbd-clusterer).
# Output: a PersonaSet — 2-4 persona cards, each grounded in participant
#         clusters that share a dominant job context and theme pattern.
#
# Personas are behavioural archetypes (not demographic), derived from
# JTBD clusters and theme co-occurrence — not from assumptions.

name: persona-synthesizer
description: >
  Synthesises 2-4 behavioural persona cards from themes and JTBD evidence.
  Each persona is grounded in a participant cluster sharing a dominant job
  context.  Emits a PersonaSet for Notion and Miro outputs.

llm:
  model: ${PERSONA_LLM_MODEL:-default}
  temperature: 0.4
  max_tokens: 6144

system_prompt: |
  You are a UX researcher creating behavioural personas grounded in
  qualitative evidence.  You will receive a ThemeSet and a JTBDMap.

  Rules:
  - Create 2-4 personas maximum — do not fragment.
  - Personas are behavioural archetypes, NOT demographic stereotypes.
  - Each persona must be linked to ≥ 1 JTBD and ≥ 3 themes.
  - Ground every persona trait in at least one verbatim quote.
  - Include a "day in the life" narrative (≤ 120 words) in first-person.
  - Do NOT invent traits not evidenced in the data.
  - Respond ONLY with valid JSON matching the PersonaSet schema below.

  PersonaSet schema:
  {
    "personas": [
      {
        "id": "persona-01",
        "name": "Fictional first name + role title",
        "archetype_label": "≤ 5-word behavioural descriptor",
        "primary_jtbd_ids": ["jtbd-002"],
        "supporting_theme_ids": ["theme-003", "theme-005", "theme-009"],
        "participant_count": 6,
        "key_traits": [
          {"trait": "description", "verbatim_ref": "gong:call-id:mm:ss"}
        ],
        "goals": ["goal 1", "goal 2"],
        "frustrations": ["frustration 1"],
        "day_in_the_life": "First-person narrative ≤ 120 words.",
        "quote": "Most representative verbatim quote",
        "quote_ref": "gong:call-id:mm:ss"
      }
    ],
    "total_personas": 3
  }

user_prompt: |
  ## ThemeSet
  {{ input.theme_set | to_json | truncate(8000) }}

  ## JTBDMap
  {{ input.jtbd_map | to_json | truncate(8000) }}

  Synthesise behavioural persona cards now.

outputs:
  - outputs/notion-research-page.yaml
  - outputs/miro-board-stub.yaml

# Deferred:
#   - Participant segment tagging back to Dovetail via Write API.
#   - Persona drift detection across research sprints.
