---
# Output: exec-email-on-crisis
#
# Sends an executive briefing email for SEV-1 crises only.
# The email includes the crisis narrative, key metrics, response recommendation
# summary, and a link to the full crisis dashboard.
#
# Only fired by crisis-early-warner when severity == sev1.
# Requires SMTP or a transactional email provider (SendGrid / Postmark).

output: exec-email-on-crisis

# Email provider configuration.
provider: ${EXEC_EMAIL_PROVIDER:-smtp}  # smtp | sendgrid | postmark

smtp:
  host: ${SMTP_HOST}
  port: ${SMTP_PORT:-587}
  username: ${SMTP_USERNAME}
  password: ${SMTP_PASSWORD}
  use_tls: true

sendgrid:
  api_key: ${SENDGRID_API_KEY}

postmark:
  server_token: ${POSTMARK_SERVER_TOKEN}

# Recipients (only for SEV-1).
recipients:
  to: ${EXEC_EMAIL_TO}           # e.g. "ceo@example.com, cmo@example.com"
  cc: ${EXEC_EMAIL_CC:-}         # e.g. "pr-lead@example.com"
  reply_to: ${PR_TEAM_EMAIL}

# Email content.
email:
  from: "xiaoguai Crisis Monitor <{{ EXEC_EMAIL_FROM }}>"
  subject: "[SEV-1 CRISIS] Brand alert: {{ crisis.title | truncate(60) }}"
  # Plain text body (HTML version below).
  text_body: |
    BRAND CRISIS ALERT — SEV-1
    ==========================
    Crisis: {{ crisis.title }}
    Declared: {{ crisis.declared_at }}
    Channels: {{ crisis.channels | join(', ') }}

    NARRATIVE
    ---------
    {{ crisis.narrative }}

    KEY METRICS
    -----------
    Hourly mentions:          {{ crisis.hourly_mention_count | commify }}
    Volume z-score:           {{ crisis.z_score | default('N/A') | round(1) }}
    Negative sentiment ratio: {{ crisis.negative_ratio | default('N/A') | pct }}
    Influence-weighted reach: {{ crisis.influence_weighted_reach | commify }}

    RESPONSE RECOMMENDATION
    -----------------------
    Action: {{ recommendation.respond | upper }}
    Timing: {{ recommendation.timing | replace('_', ' ') | title }}
    Tone:   {{ recommendation.tone | title }}
    {% if recommendation.requires_legal_review %}
    ⚠️ LEGAL REVIEW REQUIRED: {{ recommendation.legal_flag_reason }}
    {% endif %}
    {{ recommendation.rationale }}

    FULL DETAILS
    ------------
    Crisis dashboard: {{ dashboard_url }}/crises/{{ crisis.id }}
    Response strategy: {{ dashboard_url }}/crises/{{ crisis.id }}/response

    --
    This alert was generated automatically by xiaoguai media-monitoring v{{ pack_version }}.
    For questions, contact {{ PR_TEAM_EMAIL }}.

  # HTML body: same content with basic formatting.
  html_body_template: |
    <h2 style="color:#d62728;">&#128680; Brand Crisis Alert — SEV-1</h2>
    <table>
      <tr><td><b>Crisis:</b></td><td>{{ crisis.title }}</td></tr>
      <tr><td><b>Declared:</b></td><td>{{ crisis.declared_at }}</td></tr>
      <tr><td><b>Channels:</b></td><td>{{ crisis.channels | join(', ') }}</td></tr>
    </table>
    <h3>Narrative</h3>
    <p>{{ crisis.narrative }}</p>
    <h3>Key Metrics</h3>
    <table border="1" cellpadding="4">
      <tr><td>Hourly mentions</td><td>{{ crisis.hourly_mention_count | commify }}</td></tr>
      <tr><td>Volume z-score</td><td>{{ crisis.z_score | default('N/A') | round(1) }}</td></tr>
      <tr><td>Negative ratio</td><td>{{ crisis.negative_ratio | default('N/A') | pct }}</td></tr>
      <tr><td>Influence reach</td><td>{{ crisis.influence_weighted_reach | commify }}</td></tr>
    </table>
    <h3>Response Recommendation</h3>
    <p><b>{{ recommendation.respond | upper }}</b> — {{ recommendation.timing | replace('_', ' ') | title }} — {{ recommendation.tone | title }}</p>
    {% if recommendation.requires_legal_review %}
    <p style="color:#d62728;"><b>&#9888; Legal review required:</b> {{ recommendation.legal_flag_reason }}</p>
    {% endif %}
    <p>{{ recommendation.rationale }}</p>
    <p><a href="{{ dashboard_url }}/crises/{{ crisis.id }}">View full crisis dashboard &rarr;</a></p>
    <hr/>
    <p style="color:#888;font-size:12px;">Generated by xiaoguai media-monitoring v{{ pack_version }}. Contact {{ PR_TEAM_EMAIL }} for questions.</p>

# Deferred:
#   - Board-level weekly summary email (aggregated, not crisis-specific)
#   - Email open tracking for executive engagement metrics
