# cargo-audit ignore list (mirrors deny.toml [advisories].ignore + extras
# that cargo-audit treats as errors but deny.toml treats as warnings).
#
# Every entry MUST have a reason. Review quarterly — when upstream
# publishes a fixed version, drop the ignore and bump the dep.

[advisories]
ignore = [
    # rsa: Marvin Attack timing sidechannel. Pulled in transitively by
    # sqlx-mysql even though we only use Postgres. No fixed upgrade is
    # available upstream. Surface: zero (the MySQL backend is never
    # constructed). Revisit when rsa publishes a constant-time path or
    # sqlx ships feature-gated mysql/rsa decoupling.
    "RUSTSEC-2023-0071",

    # tokio-tar: PAX header smuggling. Dev-only via testcontainers →
    # bollard → tokio-tar. We control the images we ship in tests, so
    # there is no untrusted tar input. Mirrors deny.toml ignore.
    "RUSTSEC-2025-0111",

    # rustls-pemfile: unmaintained. Dev-only via testcontainers →
    # bollard. Production code never touches bollard. Mirrors deny.toml.
    "RUSTSEC-2025-0134",

    # instant: unmaintained. Pulled in transitively by notify-types →
    # notify (used by FileWatchSource). Low risk — instant is a thin
    # web-time shim. Track upstream notify migration.
    "RUSTSEC-2024-0384",

    # proc-macro-error: unmaintained. Build-time only, pulled via
    # age → i18n-embed-fl → proc-macro-error. It is a compile-time
    # proc-macro and never ends up in the shipped runtime binary.
    # Mirrors deny.toml ignore. Drop when `age` updates i18n-embed-fl.
    "RUSTSEC-2024-0370",

    # backoff: unmaintained. Transitive retry helper (feature-gated via
    # aws/otlp), not directly used. Not vulnerable. Mirrors deny.toml.
    "RUSTSEC-2025-0012",

    # async-std: discontinued. Transitive via opentelemetry_sdk 0.27,
    # never constructed directly. Drops with the pending OTel upgrade.
    # Mirrors deny.toml.
    "RUSTSEC-2025-0052",

    # ttf-parser: unmaintained. Transitive via pdf-extract → lopdf (RAG
    # PDF text extraction). Unmaintained flag only — no vulnerability and
    # RustSec offers no safe upgrade. Mirrors deny.toml; revisit when
    # lopdf moves off ttf-parser.
    "RUSTSEC-2026-0192",
]
