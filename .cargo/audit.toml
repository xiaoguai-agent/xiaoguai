# cargo-audit ignore list (mirrors deny.toml [advisories].ignore + extras
# that cargo-audit treats as errors but deny.toml treats as warnings).
#
# Every entry MUST have a reason. Review quarterly — when upstream
# publishes a fixed version, drop the ignore and bump the dep.

[advisories]
ignore = [
    # rsa: Marvin Attack timing sidechannel. Transitive via the sqlx-mysql
    # backend, which this project never enables — `cargo tree --all-features
    # -i rsa` prints nothing, so it is never compiled in. No fixed upgrade
    # exists upstream.
    #
    # KEPT HERE ON PURPOSE, and deliberately absent from deny.toml: cargo-audit
    # scans Cargo.lock verbatim with no feature resolution, so it sees `rsa`
    # and fails; cargo-deny resolves features and does not, so the same entry
    # there would be a stale unmatched ignore. This asymmetry is exactly the
    # "+ extras" clause in the header above — the two files are kept in
    # lock-step, not made identical. Do not delete this to "sync" them.
    "RUSTSEC-2023-0071",

    # proc-macro-error2: unmaintained. Build-time only, pulled via
    # age 0.12 → i18n-embed-fl → proc-macro-error2. Successor to the equally
    # unmaintained proc-macro-error (RUSTSEC-2024-0370), which left the tree
    # when age moved off 0.10. It is a compile-time proc-macro and never ends
    # up in the shipped runtime binary; the advisory offers no safe upgrade.
    # Mirrors deny.toml. Drop when i18n-embed-fl migrates away.
    "RUSTSEC-2026-0173",

    # rustls-pemfile: unmaintained. Reaches the shipped binary transitively
    # via tonic → qdrant-client (RAG vector store) — the previous
    # "dev-only via testcontainers" note lapsed when testcontainers left the
    # tree. Unmaintained flag only, no known vulnerability. Mirrors deny.toml;
    # revisit when tonic moves to rustls-pki-types.
    "RUSTSEC-2025-0134",

    # ttf-parser: unmaintained. Transitive via pdf-extract → lopdf (RAG
    # PDF text extraction). Unmaintained flag only — no vulnerability and
    # RustSec offers no safe upgrade. Mirrors deny.toml; revisit when
    # lopdf moves off ttf-parser.
    "RUSTSEC-2026-0192",
]
